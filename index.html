<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller - Diseño de Moda</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primario: #9c27b0; --secundario: #ce93d8; --fondo: #f4f4f9; --blanco: #ffffff; --texto: #333333; --borde: #eeeeee; --input-bg: #fafafa; }
        [data-theme="dark"] { --fondo: #121212; --blanco: #1e1e1e; --texto: #e1e1e1; --borde: #333333; --input-bg: #2c2c2c; --secundario: #4a148c; }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); padding: 20px; color: var(--texto); margin: 0; padding-top: calc(env(safe-area-inset-top) + 20px); transition: background 0.3s; }
        
        .theme-toggle { position: fixed; top: calc(env(safe-area-inset-top) + 10px); right: 20px; z-index: 1001; background: var(--primario); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .menu-secciones { text-align: center; margin-bottom: 25px; background: var(--blanco); padding: 15px; border-radius: 15px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; position: sticky; top: env(safe-area-inset-top); z-index: 100; border: 1px solid var(--borde); }
        .btn-nav { padding: 10px 15px; font-weight: bold; border-radius: 10px; border: 1px solid var(--borde); cursor: pointer; background: var(--blanco); font-size: 12px; color: var(--texto); transition: 0.2s; }
        .btn-nav.active { background: #fdf5ff; border-color: var(--primario); color: var(--primario); box-shadow: 0 0 10px rgba(156, 39, 176, 0.1); }
        
        .contenedor-seccion { max-width: 900px; margin: auto; }
        .seccion-diseno { background: var(--blanco); border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); border: 1px solid var(--borde); }
        
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--borde); border-radius: 10px; background: var(--input-bg); color: var(--texto); font-size: 15px; }
        
        .btn-principal { background: var(--primario); color: white; padding: 15px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        
        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .item-card { background: var(--blanco); padding: 12px; border-radius: 15px; border: 1px solid var(--borde); text-align: center; position: relative; }
        .item-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 10px; background: #eee; }
        
        .btn-eliminar { position: absolute; top: 5px; right: 5px; background: rgba(255,0,0,0.7); color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; font-weight: bold; z-index: 10; }

        .controles-stock { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-qty { width: 30px; height: 30px; border-radius: 8px; border: none; background: var(--primario); color: white; font-weight: bold; cursor: pointer; }
        
        .canvas-wrapper { position: relative; width: 100%; max-width: 400px; height: 530px; margin: 15px auto; background: #fff; border-radius: 15px; border: 2px solid var(--borde); overflow: hidden; touch-action: none; }
        #silueta-estudio { position: absolute; width: 100%; height: 100%; object-fit: contain; pointer-events: none; opacity: 0.4; }
        canvas { position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀️</button>
    <div id="botones-menu" class="menu-secciones"></div>

    <div class="contenedor-seccion">
        <div id="seccion-stock">
            <div id="formulario-registro" class="seccion-diseno" style="margin-bottom: 30px; display: none;">
                <h3 style="margin-top:0">📦 Nuevo Material</h3>
                <div class="grid-inputs">
                    <input type="text" id="m-nombre" placeholder="Nombre (ej: Lana Merino)">
                    <input type="number" id="m-cantidad" placeholder="Cantidad" value="1">
                    <select id="m-categoria"></select>
                    <input type="file" id="m-foto" accept="image/*">
                </div>
                <button class="btn-principal" onclick="subirMaterial()">AÑADIR AL TALLER</button>
            </div>
            <div id="lista-stock" class="grid-estudio"></div>
        </div>

        <div id="seccion-proyectos" style="display:none;">
            <div class="seccion-diseno">
                <h2 style="text-align:center; color:var(--primario)">✨ NUEVO DISEÑO</h2>
                <input type="text" id="p-nombre" placeholder="Nombre del Proyecto" style="margin-bottom:10px">
                <textarea id="p-notas" placeholder="Notas de confección..." style="margin-bottom:10px"></textarea>
                <div class="canvas-wrapper"><img id="silueta-estudio" src="Silueta 3 cuerpos.jpg"><canvas id="lienzo" width="400" height="530"></canvas></div>
                <div style="display:flex; gap:10px; margin-bottom:20px"><input type="color" id="pincel-color" value="#9c27b0" style="width:60px"><button onclick="limpiarLienzo()" style="flex:1">Limpiar</button></div>
                <button class="btn-principal" onclick="guardarProyectoCompleto()">GUARDAR PROYECTO</button>
            </div>
            <div id="historial-proyectos" class="grid-estudio"></div>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let stockLocal = [];
    let secciones = [];
    let vistaActual = 'INICIO';
    const canvas = document.getElementById('lienzo');
    const ctx = canvas.getContext('2d');
    let pintando = false;

    function toggleTheme() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('tema', isDark ? 'claro' : 'oscuro');
    }

    async function init() {
        if (localStorage.getItem('tema') === 'oscuro') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '🌙';
        }
        const { data } = await client.from('Secciones').select('nombre');
        secciones = data ? data.map(s => s.nombre) : [];
        renderMenu();
        renderSelect();
        await cargarStock();
        setupDibujo();
        cambiarVista('INICIO');
    }

    function renderMenu() {
        let html = `<button class="btn-nav" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 INICIO</button>`;
        secciones.forEach(s => {
            let emoji = '🧶'; 
            const nombre = s.toLowerCase();
            if (nombre.includes('tela')) emoji = '👗';
            else if (nombre.includes('hilo')) emoji = '🧵';
            else if (nombre.includes('accesorios')) emoji = '🎀';
            else if (nombre.includes('otros')) emoji = '🧸';

            html += `<button class="btn-nav" id="nav-${s}" onclick="cambiarVista('${s}')">${emoji} ${s.toUpperCase()}</button>`;
        });
        html += `<button class="btn-nav" style="background:var(--secundario);color:white" onclick="cambiarVista('PROYECTOS')">📂 PROYECTOS</button>`;
        document.getElementById('botones-menu').innerHTML = html;
    }

    function renderSelect() {
        document.getElementById('m-categoria').innerHTML = secciones.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    async function cargarStock() {
        const { data } = await client.from('estudio_data').select('*').order('created_at', { ascending: false });
        stockLocal = data || [];
        renderStock(stockLocal);
    }

    function renderStock(items) {
        document.getElementById('lista-stock').innerHTML = items.map(m => `
            <div class="item-card">
                <button class="btn-eliminar" onclick="eliminarProducto(${m.id})">×</button>
                <img src="${m.contenido || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                <strong>${m.tipo_material}</strong>
                <p style="font-size:11px; margin:5px 0; opacity:0.7">${m.categoria}</p>
                <div class="controles-stock">
                    <button class="btn-qty" onclick="actualizarCant(${m.id},-1)">-</button>
                    <span>${m.cantidad || 0}</span>
                    <button class="btn-qty" onclick="actualizarCant(${m.id},1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function cambiarVista(v) {
        vistaActual = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        const btnActivo = document.getElementById(`nav-${v}`);
        if(btnActivo) btnActivo.classList.add('active');

        const isPro = v === 'PROYECTOS';
        const isInicio = v === 'INICIO';
        
        document.getElementById('seccion-stock').style.display = isPro ? 'none' : 'block';
        document.getElementById('seccion-proyectos').style.display = isPro ? 'block' : 'none';
        document.getElementById('formulario-registro').style.display = isInicio ? 'block' : 'none';
        
        if(!isPro) {
            let filt = isInicio ? stockLocal : stockLocal.filter(i => i.categoria.toLowerCase() === v.toLowerCase());
            renderStock(filt);
        } else {
            cargarHistorial();
        }
    }

    async function actualizarCant(id, d) {
        const i = stockLocal.find(x => x.id === id);
        const nc = Math.max(0, (i.cantidad || 0) + d);
        await client.from('estudio_data').update({ cantidad: nc }).eq('id', id);
        i.cantidad = nc;
        cambiarVista(vistaActual);
    }

    async function eliminarProducto(id) {
        if(confirm("¿Seguro que quieres eliminar este material?")) {
            const { error } = await client.from('estudio_data').delete().eq('id', id);
            if(!error) {
                stockLocal = stockLocal.filter(x => x.id !== id);
                cambiarVista(vistaActual);
            }
        }
    }

    async function subirMaterial() {
        const nombre = document.getElementById('m-nombre').value;
        const cantidad = document.getElementById('m-cantidad').value;
        const categoria = document.getElementById('m-categoria').value;
        const fotoFile = document.getElementById('m-foto').files[0];
        if (!nombre) return alert("Falta el nombre");

        let fotoUrl = "";
        if (fotoFile) {
            // Ajustado a "media" en minúsculas y limpieza de nombre de archivo
            const fileName = `${Date.now()}_${fotoFile.name.replace(/\s+/g, '_')}`;
            const { error: upErr } = await client.storage.from('media').upload(fileName, fotoFile);
            
            if (!upErr) {
                const { data } = client.storage.from('media').getPublicUrl(fileName);
                if (data) fotoUrl = data.publicUrl;
            } else {
                console.error("Error al subir:", upErr);
                return alert("Error al subir la imagen. Revisa las políticas de Supabase.");
            }
        }

        const { error } = await client.from('estudio_data').insert([{
            tipo_material: nombre,
            cantidad: parseInt(cantidad),
            categoria: categoria,
            contenido: fotoUrl
        }]);

        if (!error) {
            alert("¡Material añadido!");
            location.reload();
        }
    }

    function setupDibujo() {
        ctx.lineWidth = 3; ctx.lineCap = 'round';
        const cp = document.getElementById('pincel-color');
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - r.left;
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - r.top;
            return { x, y };
        };
        canvas.onmousedown = (e) => { pintando = true; ctx.beginPath(); ctx.strokeStyle = cp.value; const p = getP(e); ctx.moveTo(p.x, p.y); };
        canvas.onmousemove = (e) => { if(pintando) { const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } };
        window.onmouseup = () => pintando = false;
        canvas.ontouchstart = (e) => { e.preventDefault(); pintando = true; ctx.beginPath(); ctx.strokeStyle = cp.value; const p = getP(e); ctx.moveTo(p.x, p.y); };
        canvas.ontouchmove = (e) => { e.preventDefault(); if(pintando) { const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } };
    }

    function limpiarLienzo() { ctx.clearRect(0,0,450,600); }

    async function guardarProyectoCompleto() {
        const nom = document.getElementById('p-nombre').value;
        if(!nom) return alert("Falta nombre");
        await client.from('Proyectos').insert([{
            nombre: nom,
            diseno_canvas: canvas.toDataURL(),
            patron_punto: document.getElementById('p-notas').value
        }]);
        alert("¡Proyecto Guardado!");
        cambiarVista('PROYECTOS');
    }

    async function cargarHistorial() {
        const { data } = await client.from('Proyectos').select('*').order('created_at', { ascending: false });
        document.getElementById('historial-proyectos').innerHTML = (data || []).map(p => `
            <div class="item-card">
                <img src="${p.diseno_canvas}">
                <strong>${p.nombre}</strong>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
