<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primario: #ff85a2; 
            --primario-claro: #fce4ec; 
            --secundario: #f06292; 
            --fondo: #fcf8f9; 
            --blanco: #ffffff; 
            --texto: #4a4a4a; 
            --borde: #f1e1e5; 
        }
        [data-theme="dark"] { 
            --fondo: #1a1617; --blanco: #2d2426; --texto: #fce4ec; --borde: #3d3436;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); padding: 20px; color: var(--texto); margin: 0; padding-top: calc(env(safe-area-inset-top) + 20px); }
        
        .menu-secciones { text-align: center; margin-bottom: 20px; background: var(--blanco); padding: 8px; border-radius: 20px; display: flex; justify-content: center; gap: 5px; position: sticky; top: env(safe-area-inset-top); z-index: 100; border: 1px solid var(--borde); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-nav { padding: 12px 10px; font-weight: 600; border-radius: 15px; border: 2px solid transparent; cursor: pointer; background: transparent; font-size: 11px; color: #888; flex: 1; }
        .btn-nav.active { background: var(--primario-claro); color: var(--secundario); border-bottom: 3px solid var(--secundario); }
        
        .filtros-materiales { display: flex; gap: 10px; overflow-x: auto; padding: 5px 10px 20px 10px; }
        .btn-filtro { padding: 8px 16px; font-size: 13px; border-radius: 25px; border: 1px solid var(--borde); background: var(--blanco); cursor: pointer; white-space: nowrap; }
        .btn-filtro.active { background: var(--secundario); color: white; }

        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 10px; }
        .item-card { background: var(--blanco); padding: 12px; border-radius: 20px; border: 1px solid var(--borde); text-align: center; position: relative; }
        .item-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 15px; }
        
        .btn-eliminar { position: absolute; top: -5px; right: -5px; background: #ff5252; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; }
        .btn-editar { position: absolute; top: -5px; left: -5px; background: #FFC107; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; }

        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--borde); border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-principal { background: var(--primario); color: white; padding: 16px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>

    <div class="menu-secciones">
        <button class="btn-nav active" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 Inicio</button>
        <button class="btn-nav" id="nav-MATERIALES" onclick="cambiarVista('MATERIALES')">📦 Materiales</button>
        <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 Proyectos</button>
    </div>

    <div id="contenedor-filtros" class="filtros-materiales" style="display:none;"></div>

    <div class="contenedor-seccion">
        <div id="seccion-stock">
            <div id="formulario-registro" style="background: var(--blanco); padding: 20px; border-radius: 25px; margin-bottom: 20px; border: 1px solid var(--borde); display: none;">
                <h3 id="form-titulo">🌸 Nuevo Material</h3>
                <input type="text" id="m-nombre" placeholder="Nombre">
                <select id="m-categoria" onchange="mostrarCamposExtra(this.value)"></select>
                <input type="number" id="m-cantidad" placeholder="Cantidad" value="1">
                
                <div id="campos-lana" style="display:none; background: var(--primario-claro); padding: 10px; border-radius: 15px; margin-bottom: 10px;">
                    <input type="text" id="m-composicion" placeholder="Composición">
                    <input type="text" id="m-grosor" placeholder="Grosor">
                    <input type="text" id="m-tienda" placeholder="Tienda">
                </div>
                
                <input type="file" id="m-foto" accept="image/*">
                <button id="btn-guardar" class="btn-principal" onclick="subirMaterial()">GUARDAR</button>
            </div>
            <div id="lista-stock" class="grid-estudio"></div>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let stockLocal = [];
    let secciones = [];
    let editandoId = null;

    async function init() {
        const { data: dataSec } = await client.from('Secciones').select('nombre');
        secciones = dataSec ? dataSec.map(s => s.nombre.trim()) : [];
        renderFiltros();
        renderSelect();
        await cargarStock();
        cambiarVista('INICIO');
    }

    async function cargarStock() {
        const { data } = await client.from('estudio_data').select('*').order('created_at', { ascending: false });
        stockLocal = data || [];
        renderStock(stockLocal);
    }

    function renderStock(items) {
        document.getElementById('lista-stock').innerHTML = items.map(m => {
            const esLana = m.categoria && m.categoria.toLowerCase().includes('lana');
            let info = "";
            if(esLana && m.notas) {
                const p = m.notas.split(' | ');
                info = `<div style="font-size:10px; color:#666; text-align:left;">${p[0] || ''} - ${p[1] || ''}</div>`;
            }
            return `
            <div class="item-card">
                <button class="btn-eliminar" onclick="eliminarProducto(${m.id})">×</button>
                <button class="btn-editar" onclick="editarMaterial(${m.id})">✏️</button>
                <img src="${m.contenido || 'https://via.placeholder.com/150'}">
                <strong>${m.tipo_material}</strong>
                ${info}
                <div style="color:var(--secundario); font-weight:bold;">Cant: ${m.cantidad}</div>
            </div>`;
        }).join('');
    }

    // EL FILTRO "TODOTERRENO"
    function filtrarMateriales(catBusqueda) {
        // Marcamos el botón activo
        document.querySelectorAll('.btn-filtro').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.includes(catBusqueda) || (catBusqueda === 'TODOS' && btn.innerText.includes('Todo')));
        });

        if (catBusqueda === 'TODOS') {
            renderStock(stockLocal);
        } else {
            // Buscamos si la palabra existe dentro del nombre de la categoría
            // Esto arregla el fallo de "Lana" vs "Lanas" o " Lana"
            const filtrados = stockLocal.filter(i => {
                const categoriaDelProducto = (i.categoria || "").toLowerCase().trim();
                const palabraBuscada = catBusqueda.toLowerCase().trim();
                return categoriaDelProducto.includes(palabraBuscada);
            });
            renderStock(filtrados);
        }
    }

    function renderFiltros() {
        let html = `<button class="btn-filtro active" onclick="filtrarMateriales('TODOS')">✨ Todo</button>`;
        secciones.forEach(s => {
            html += `<button class="btn-filtro" onclick="filtrarMateriales('${s}')">🌸 ${s}</button>`;
        });
        document.getElementById('contenedor-filtros').innerHTML = html;
    }

    function renderSelect() {
        document.getElementById('m-categoria').innerHTML = secciones.map(s => `<option value="${s}">${s}</option>`).join('');
    }

    function cambiarVista(v) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav-${v}`).classList.add('active');
        document.getElementById('formulario-registro').style.display = (v === 'INICIO' ? 'block' : 'none');
        document.getElementById('contenedor-filtros').style.display = (v === 'MATERIALES' ? 'flex' : 'none');
        if (v === 'MATERIALES') filtrarMateriales('TODOS');
        if (v === 'INICIO') renderStock(stockLocal);
    }

    async function subirMaterial() {
        const nombre = document.getElementById('m-nombre').value;
        const cat = document.getElementById('m-categoria').value;
        if(!nombre) return alert("Pon un nombre");

        const notas = `${document.getElementById('m-composicion').value} | ${document.getElementById('m-grosor').value} | ${document.getElementById('m-tienda').value} | 🏠 En espera`;
        const payload = { tipo_material: nombre, categoria: cat, cantidad: document.getElementById('m-cantidad').value, notas: notas };

        const file = document.getElementById('m-foto').files[0];
        if(file) {
            const name = `img_${Date.now()}`;
            await client.storage.from('media').upload(name, file);
            payload.contenido = client.storage.from('media').getPublicUrl(name).data.publicUrl;
        }

        if(editandoId) await client.from('estudio_data').update(payload).eq('id', editandoId);
        else await client.from('estudio_data').insert([payload]);
        
        location.reload();
    }

    function mostrarCamposExtra(cat) {
        document.getElementById('campos-lana').style.display = (cat.toLowerCase().includes('lana') ? 'block' : 'none');
    }

    async function eliminarProducto(id) {
        if(confirm("¿Borrar?")) { await client.from('estudio_data').delete().eq('id', id); location.reload(); }
    }

    function editarMaterial(id) {
        const m = stockLocal.find(x => x.id === id);
        editandoId = id;
        cambiarVista('INICIO');
        document.getElementById('m-nombre').value = m.tipo_material;
        document.getElementById('m-categoria').value = m.categoria;
        document.getElementById('m-cantidad').value = m.cantidad;
        mostrarCamposExtra(m.categoria);
    }

    init();
</script>
</body>
</html>
