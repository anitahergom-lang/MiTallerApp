<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
        :root { 
            --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --br: #f1e1e5; --txt: #444; 
        }
        [data-theme="dark"] {
            --p: #ff85a2; --pc: #4a2b34; --s: #f06292; --f: #121212; --b: #1e1e1e; --br: #333333; --txt: #fce4ec;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--txt); margin: 0; padding: 15px; padding-bottom: 80px; transition: 0.3s; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-icon { background: var(--pc); border: none; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-icon:active { transform: scale(0.9); }

        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .menu-item { background: var(--b); padding: 20px; border-radius: 20px; text-align: center; border: 2px solid var(--br); cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .menu-item:active { transform: scale(0.95); }
        .menu-item i { font-size: 2.5rem; display: block; margin-bottom: 10px; }
        .menu-item span { font-weight: 600; font-size: 0.9rem; }

        .section { display: none; animation: fadeIn 0.3s ease-out; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .search-container { position: relative; margin-bottom: 20px; }
        .search-input { width: 100%; padding: 15px 45px 15px 15px; border-radius: 15px; border: 2px solid var(--br); background: var(--b); font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s; color: var(--txt); }
        .search-input:focus { border-color: var(--p); box-shadow: 0 0 0 4px var(--pc); }
        
        .muro { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .post-it { padding: 15px; border-radius: 10px; min-height: 120px; position: relative; cursor: pointer; box-shadow: 3px 3px 10px rgba(0,0,0,0.1); transition: 0.3s; transform: rotate(-1deg); }
        .post-it:nth-child(even) { transform: rotate(1.5deg); }
        .post-it:hover { transform: scale(1.05) rotate(0deg); z-index: 10; }
        .p-rosa { background: #ffc1e3; } .p-azul { background: #c1e3ff; } .p-verde { background: #c1ffda; } .p-amarillo { background: #fffec1; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(3px); }
        .modal-content { background: var(--b); padding: 25px; border-radius: 25px; width: 90%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--br); border-radius: 10px; background: var(--f); color: var(--txt); box-sizing: border-box; font-family: inherit; }
        
        .btn-principal { background: var(--p); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        .nav-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--b); display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--br); z-index: 900; }
        .nav-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; font-size: 0.7rem; color: #888; }
        .nav-item.active { color: var(--p); }
        .nav-item i { font-size: 1.5rem; margin-bottom: 2px; }

        .stock-card { background: var(--b); padding: 15px; border-radius: 15px; border: 1px solid var(--br); margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; }
        .badge-low { background: #ffebee; color: #c62828; }
        .badge-ok { background: #e8f5e9; color: #2e7d32; }

        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .calc-btn { background: var(--pc); border: none; padding: 15px; border-radius: 10px; font-size: 1.2rem; font-weight: bold; cursor: pointer; color: var(--txt); }
        .calc-btn.op { background: var(--p); color: white; }
        #calc-display { grid-column: span 4; background: var(--f); padding: 20px; text-align: right; font-size: 1.5rem; border-radius: 10px; margin-bottom: 10px; border: 2px solid var(--br); }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="font-size: 1.5rem; margin: 0;">🌸 Mi Taller Rosa</h1>
        <button class="btn-icon" onclick="toggleTheme()">🌓</button>
    </div>

    <div id="sec-inicio" class="section active">
        <div class="search-container">
            <input type="text" class="search-input" placeholder="¿Qué buscas hoy?..." onkeyup="buscadorGlobal(this.value)">
            <span style="position:absolute; right:15px; top:15px; opacity:0.5;">🔍</span>
        </div>
        <div class="menu-grid">
            <div class="menu-item" onclick="showSection('sec-notas')"><i>📝</i><span>Notas</span></div>
            <div class="menu-item" onclick="showSection('sec-stock')"><i>📦</i><span>Stock</span></div>
            <div class="menu-item" onclick="showSection('sec-compras')"><i>🛒</i><span>Lista Compra</span></div>
            <div class="menu-item" onclick="showSection('sec-calc')"><i>🧮</i><span>Calculadora</span></div>
        </div>
    </div>
<div style="margin-top:30px; background: var(--b); padding: 20px; border-radius: 20px; border: 2px solid var(--br);">
        <h3>📥 Ingreso de Material</h3>
        <input type="text" id="st-nombre" placeholder="Nombre del material...">
        <select id="st-categoria">
            <option value="lana">Lana</option>
            <option value="telas">Telas</option>
            <option value="hilos">Hilos</option>
            <option value="accesorios">Accesorios</option>
            <option value="otros">Otros</option>
        </select>
        <input type="text" id="st-composicion" placeholder="Composición...">
        <input type="text" id="st-tienda" placeholder="Tienda donde se compró...">
        <input type="text" id="st-grosor" placeholder="Grosor (mm, fingering...)">
        <input type="text" id="st-longitud" placeholder="Longitud (metros/gramos)">
        <textarea id="st-notas" placeholder="Notas adicionales sobre el material..."></textarea>
        <input type="text" id="st-foto" placeholder="URL de la foto del material...">
        <button class="btn-principal" onclick="guardarStock()">💾 Guardar Stock</button>
    </div>

    <div id="sec-stock" class="section">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button class="btn-icon" onclick="showSection('sec-inicio')">⬅️</button>
            <h2 style="margin:0;">📦 Mi Stock</h2>
            <div></div>
        </div>

        <div style="display:flex; gap:10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px;">
            <button class="btn-icon" style="font-size:0.8rem; white-space:nowrap;" onclick="cargarStock('todos')">Todo</button>
            <button class="btn-icon" style="font-size:0.8rem; white-space:nowrap;" onclick="cargarStock('lana')">Lanas</button>
            <button class="btn-icon" style="font-size:0.8rem; white-space:nowrap;" onclick="cargarStock('telas')">Telas</button>
            <button class="btn-icon" style="font-size:0.8rem; white-space:nowrap;" onclick="cargarStock('hilos')">Hilos</button>
            <button class="btn-icon" style="font-size:0.8rem; white-space:nowrap;" onclick="cargarStock('accesorios')">Accesorios</button>
            <button class="btn-icon" style="font-size:0.8rem; white-space:nowrap;" onclick="cargarStock('otros')">Otros</button>
        </div>

        <div id="lista-stock">
            </div>
    </div>

    <div id="sec-caprichos" class="section">
        <button class="btn-icon" onclick="showSection('sec-inicio')">⬅️ Volver al Inicio</button>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="btn-principal" onclick="abrirSubSeccion('cap-añadir')">➕ Añadir</button>
            <button class="btn-principal" onclick="abrirSubSeccion('cap-historial')">📜 Mi Historial</button>
            <button class="btn-principal" onclick="abrirSubSeccion('cap-termometro')">🌡️ El Termómetro</button>
            <button class="btn-principal" onclick="abrirSubSeccion('cap-felicidad')">😊 Resumen Felicidad</button>
        </div>
<div id="cap-añadir" class="sub-seccion-cap" style="display:none; margin-top:20px; background:var(--b); padding:20px; border-radius:20px; border:2px solid var(--br);">
            <h3>🛍️ Registrar Nueva Compra</h3>
            <select id="cap-tipo" onchange="actualizarSubcategorias()">
                <option value="material">Material</option>
                <option value="herramientas">Herramientas</option>
                <option value="formacion">Formación</option>
            </select>
            <div id="div-subcategoria">
                <select id="cap-subcategoria">
                    <option value="lanas">Lanas</option>
                    <option value="telas">Telas</option>
                    <option value="hilos">Hilos</option>
                    <option value="accesorios">Accesorios</option>
                    <option value="otros">Otros</option>
                </select>
            </div>
            <input type="text" id="cap-nombre" placeholder="Nombre del producto...">
            <input type="number" id="cap-precio" placeholder="Precio por unidad/ovillo...">
            <input type="date" id="cap-fecha">
            <input type="text" id="cap-composicion" placeholder="Composición (solo material)...">
            <input type="text" id="cap-grosor" placeholder="Grosor (solo material)...">
            <input type="text" id="cap-foto" placeholder="URL de la foto...">
            <button class="btn-principal" onclick="registrarCompraCapricho()">💖 Registrar y sincronizar</button>
        </div>

        <div id="cap-historial" class="sub-seccion-cap" style="display:none; margin-top:20px;">
            </div>

        <div id="cap-termometro" class="sub-seccion-cap" style="display:none; margin-top:20px;">
            <div style="background:var(--b); padding:20px; border-radius:20px; border:2px solid var(--br);">
                <h3>🌡️ Termómetro Mensual</h3>
                <div id="cont-termometro" style="width:100%; background:#eee; height:30px; border-radius:15px; overflow:hidden;">
                    <div id="bar-termometro" style="width:0%; height:100%; background:var(--p); transition:0.5s;"></div>
                </div>
                <p id="info-gastos" style="text-align:center; margin-top:10px; font-weight:bold;"></p>
            </div>
        </div>
    </div>

    <div id="sec-compras" class="section">
        <button class="btn-icon" onclick="showSection('sec-inicio')">⬅️</button>
        <h2>🛒 Lista de la Compra</h2>
        <div style="background:var(--b); padding:15px; border-radius:20px; border:2px solid var(--br);">
            <input type="text" id="li-nombre" placeholder="¿Qué necesitas comprar?">
            <input type="text" id="li-tienda" placeholder="¿En qué tienda?">
            <select id="li-prioridad">
                <option value="baja">Prioridad Baja</option>
                <option value="media">Prioridad Media</option>
                <option value="alta">¡Urgente! 🔥</option>
            </select>
            <button class="btn-principal" onclick="añadirALista()">➕ Añadir a la lista</button>
        </div>
        <div id="contenedor-lista-compra" style="margin-top:20px;"></div>
    </div>

    <div id="sec-notas" class="section">
        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <button class="btn-icon" onclick="showSection('sec-inicio')">⬅️</button>
            <h2 style="margin:0;">📝 Mural de Ideas</h2>
            <button class="btn-icon" onclick="abrirModalNota()" style="background:var(--p); color:white;">➕</button>
        </div>
        <div id="muro-notas" class="muro">
            </div>
    </div>
<div id="sec-calc" class="section">
        <button class="btn-icon" onclick="showSection('sec-inicio')">⬅️ Volver</button>
        <div style="max-width:320px; margin: 20px auto; background:var(--b); padding:20px; border-radius:25px; border:2px solid var(--br);">
            <div id="calc-display">0</div>
            <div class="calc-grid">
                <button class="calc-btn" onclick="clearCalc()" style="grid-column: span 2; background:#ffcdd2;">C</button>
                <button class="calc-btn op" onclick="appendCalc('/')">÷</button>
                <button class="calc-btn op" onclick="appendCalc('*')">×</button>
                <button class="calc-btn" onclick="appendCalc('7')">7</button>
                <button class="calc-btn" onclick="appendCalc('8')">8</button>
                <button class="calc-btn" onclick="appendCalc('9')">9</button>
                <button class="calc-btn op" onclick="appendCalc('-')">-</button>
                <button class="calc-btn" onclick="appendCalc('4')">4</button>
                <button class="calc-btn" onclick="appendCalc('5')">5</button>
                <button class="calc-btn" onclick="appendCalc('6')">6</button>
                <button class="calc-btn op" onclick="appendCalc('+')">+</button>
                <button class="calc-btn" onclick="appendCalc('1')">1</button>
                <button class="calc-btn" onclick="appendCalc('2')">2</button>
                <button class="calc-btn" onclick="appendCalc('3')">3</button>
                <button class="calc-btn op" onclick="calculate()">=</button>
                <button class="calc-btn" style="grid-column: span 2;" onclick="appendCalc('0')">0</button>
                <button class="calc-btn" onclick="appendCalc('.')">.</button>
            </div>
        </div>
    </div>

    <div class="nav-bottom">
        <div class="nav-item active" onclick="showSection('sec-inicio')"><i>🏠</i><span>Inicio</span></div>
        <div class="nav-item" onclick="showSection('sec-stock')"><i>📦</i><span>Stock</span></div>
        <div class="nav-item" onclick="showSection('sec-notas')"><i>📝</i><span>Notas</span></div>
        <div class="nav-item" onclick="showSection('sec-calc')"><i>🧮</i><span>Calc</span></div>
    </div>

    <div id="modal-nota" class="modal">
        <div class="modal-content">
            <h3 id="modal-nota-titulo">📌 Pegar Nota</h3>
            <input type="hidden" id="nota-id-edit">
            <input type="text" id="n-titulo" placeholder="Título (opcional)">
            <textarea id="n-contenido" rows="5" placeholder="Escribe tu nota aquí..."></textarea>
            <input type="text" id="n-url" placeholder="URL (YouTube, Instagram...)">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <button class="btn-principal" onclick="guardarNota()">💾 Pegar</button>
                <button class="btn-principal" style="background:#ccc; color:#333;" onclick="cerrarModalNota()">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE - USA TUS PROPIAS CLAVES
        const supabaseUrl = 'TU_URL_AQUÍ';
        const supabaseKey = 'TU_KEY_AQUÍ';
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            if(id === 'sec-inicio') document.querySelectorAll('.nav-item')[0].classList.add('active');
            if(id === 'sec-stock') { document.querySelectorAll('.nav-item')[1].classList.add('active'); cargarStock('todos'); }
            if(id === 'sec-notas') { document.querySelectorAll('.nav-item')[2].classList.add('active'); cargarNotas(); }
            if(id === 'sec-calc') document.querySelectorAll('.nav-item')[3].classList.add('active');
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('tema-preferido', target);
        }
// --- LÓGICA DE NOTAS (CORREGIDA) ---
        async function cargarNotas() {
            const muro = document.getElementById('muro-notas');
            if (!muro) return;
            muro.innerHTML = '<p style="text-align:center; opacity:0.5;">Cargando mural...</p>';

            // Corregido: ordenamos por la columna 'fecha'
            const { data, error } = await client.from('notas').select('*').order('fecha', { ascending: false });

            if (error) {
                console.error("Error cargando notas:", error);
                return;
            }

            muro.innerHTML = '';
            data.forEach((n, index) => {
                const coloresPostIt = ['p-rosa', 'p-azul', 'p-verde', 'p-amarillo'];
                const colorClass = coloresPostIt[index % coloresPostIt.length];
                const div = document.createElement('div');
                div.className = `post-it ${colorClass}`;
                
                // Corregido: lee de 'texto' o de 'contenido' para no perder nada
                const elTexto = n.texto || n.contenido || '';
                
                div.onclick = () => abrirModalNota(n.id, n.titulo, elTexto, n.url);
                
                div.innerHTML = `
                    ${n.titulo ? `<h3>${n.titulo}</h3>` : ''}
                    <p>${elTexto}</p>
                    <button onclick="event.stopPropagation(); eliminarNota('${n.id}')" style="position:absolute; top:5px; right:5px; background:none; border:none; opacity:0.2; cursor:pointer;">✕</button>
                `;
                muro.appendChild(div);
            });
        }

        async function guardarNota() {
            const id = document.getElementById('nota-id-edit').value;
            const valorContenido = document.getElementById('n-contenido').value;
            
            const notaData = {
                titulo: document.getElementById('n-titulo').value,
                texto: valorContenido,
                contenido: valorContenido, // Guardamos en ambos para evitar errores de columna
                url: document.getElementById('n-url').value,
                fecha: new Date().toISOString() // Añadimos la fecha para el orden
            };

            if (!notaData.titulo && !valorContenido && !notaData.url) return alert("¡No puedes pegar un post-it vacío!");

            let res;
            if (id) {
                res = await client.from('notas').update(notaData).eq('id', id);
            } else {
                res = await client.from('notas').insert([notaData]);
            }

            if (!res.error) {
                cerrarModalNota();
                cargarNotas();
            } else {
                alert("Error al guardar: " + res.error.message);
            }
        }

        function abrirModalNota(id='', tit='', cont='', url='') {
            document.getElementById('nota-id-edit').value = id;
            document.getElementById('n-titulo').value = tit;
            document.getElementById('n-contenido').value = cont;
            document.getElementById('n-url').value = url;
            document.getElementById('modal-nota-titulo').innerText = id ? "✏️ Editar Nota" : "📌 Pegar Nota";
            document.getElementById('modal-nota').style.display = 'flex';
        }

        function cerrarModalNota() {
            document.getElementById('modal-nota').style.display = 'none';
        }

        async function eliminarNota(id) {
            if (confirm("¿Quieres arrancar este post-it del mural?")) {
                const { error } = await client.from('notas').delete().eq('id', id);
                if (!error) cargarNotas();
            }
        }

        // --- EL RESTO DE TUS FUNCIONES (SIN TOCAR) ---
        // Aquí siguen tus funciones de guardarStock(), registrarCompraCapricho(), etc.
        // Tal cual las tenías en tu archivo original.

        window.onload = function() {
            const temaGuardado = localStorage.getItem('tema-preferido');
            if (temaGuardado) {
                document.documentElement.setAttribute('data-theme', temaGuardado);
            }
        };
    </script>
</body>
</html>
