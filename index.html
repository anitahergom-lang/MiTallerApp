<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa - Diseño de Moda</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primario: #ff85a2; 
            --primario-claro: #fce4ec; 
            --secundario: #f06292; 
            --fondo: #fcf8f9; 
            --blanco: #ffffff; 
            --texto: #4a4a4a; 
            --borde: #f1e1e5; 
            --input-bg: #ffffff; 
        }
        [data-theme="dark"] { 
            --fondo: #1a1617; --blanco: #2d2426; --texto: #fce4ec; --borde: #3d3436; --input-bg: #3d3436; --primario-claro: #4a1e28;
        }
        
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); padding: 20px; color: var(--texto); margin: 0; padding-top: calc(env(safe-area-inset-top) + 20px); transition: 0.3s; }
        
        .theme-toggle { position: fixed; top: calc(env(safe-area-inset-top) + 10px); right: 20px; z-index: 1001; background: var(--primario); color: white; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3); }
        
        .menu-secciones { text-align: center; margin-bottom: 20px; background: var(--blanco); padding: 8px; border-radius: 20px; display: flex; justify-content: center; gap: 5px; position: sticky; top: env(safe-area-inset-top); z-index: 100; border: 1px solid var(--borde); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-nav { padding: 12px 10px; font-weight: 600; border-radius: 15px; border: 2px solid transparent; cursor: pointer; background: transparent; font-size: 11px; color: #888; transition: 0.3s; flex: 1; text-transform: uppercase; }
        .btn-nav.active { background: var(--primario-claro); color: var(--secundario); border-bottom: 3px solid var(--secundario); transform: translateY(-2px); }
        
        .filtros-materiales { display: flex; gap: 10px; overflow-x: auto; padding: 5px 10px 20px 10px; justify-content: flex-start; scrollbar-width: none; }
        .btn-filtro { padding: 8px 16px; font-size: 13px; border-radius: 25px; border: 1px solid var(--borde); background: var(--blanco); color: var(--texto); cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .btn-filtro.active { background: var(--secundario); color: white; border-color: var(--secundario); transform: scale(1.05); }

        .contenedor-seccion { max-width: 900px; margin: auto; }
        .seccion-diseno { background: var(--blanco); border-radius: 25px; padding: 25px; border: 1px solid var(--borde); }
        
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--borde); border-radius: 12px; background: var(--input-bg); color: var(--texto); font-size: 15px; margin-bottom: 10px; outline: none; box-sizing: border-box; }
        
        .btn-principal { background: var(--primario); color: white; padding: 16px; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; width: 100%; font-size: 16px; }
        
        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 10px; }
        .item-card { background: var(--blanco); padding: 12px; border-radius: 20px; border: 1px solid var(--borde); text-align: center; position: relative; }
        .item-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 15px; background: #fff5f7; }
        
        .btn-eliminar { position: absolute; top: -5px; right: -5px; background: #ff5252; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 10; }
        .btn-editar { position: absolute; top: -5px; left: -5px; background: #FFC107; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; z-index: 10; }

        .controles-stock { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 12px; }
        .btn-qty { width: 32px; height: 32px; border-radius: 10px; border: none; background: var(--primario-claro); color: var(--secundario); font-weight: bold; cursor: pointer; }
        
        .canvas-wrapper { position: relative; width: 100%; max-width: 400px; height: 530px; margin: 15px auto; background: #fff; border-radius: 20px; border: 3px solid var(--primario-claro); overflow: hidden; }
        #silueta-estudio { position: absolute; width: 100%; height: 100%; object-fit: contain; pointer-events: none; opacity: 0.3; }
        canvas { position: absolute; top: 0; left: 0; touch-action: none; }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀️</button>
    
    <div class="menu-secciones">
        <button class="btn-nav" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 Inicio</button>
        <button class="btn-nav" id="nav-MATERIALES" onclick="cambiarVista('MATERIALES')">📦 Materiales</button>
        <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 Proyectos</button>
    </div>

    <div id="contenedor-filtros" class="filtros-materiales" style="display:none;"></div>

    <div class="contenedor-seccion">
        <div id="seccion-stock">
            <div id="formulario-registro" class="seccion-diseno" style="margin-bottom: 30px; display: none;">
                <h3 id="form-titulo" style="margin-top:0; color: var(--secundario);">🌸 Registro de Material</h3>
                <input type="text" id="m-nombre" placeholder="Nombre (ej: Lana Merino Soft)">
                
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <select id="m-categoria" onchange="mostrarCamposExtra(this.value)" style="flex: 1;"></select>
                    <input type="number" id="m-cantidad" placeholder="Cant." value="1" style="width: 80px;">
                </div>

                <div id="campos-lana" style="display:none; background: var(--primario-claro); padding: 15px; border-radius: 18px; margin-bottom: 15px; border: 1px dashed var(--secundario);">
                    <input type="text" id="m-composicion" placeholder="🧶 Composición (ej: 100% Algodón)">
                    <input type="text" id="m-grosor" placeholder="📏 Grosor (ej: DK, 4mm)">
                    <input type="text" id="m-tienda" placeholder="📍 Lugar de compra">
                    <select id="m-estado-uso" style="margin-top:10px; border: 1px solid var(--secundario);">
                        <option value="🏠 En espera">🏠 En espera (disponible)</option>
                        <option value="📋 Asignada">📋 Asignada a un proyecto</option>
                        <option value="🥢 En proceso">🥢 En proceso de tejido</option>
                    </select>
                </div>

                <input type="file" id="m-foto" accept="image/*">
                <button id="btn-guardar" class="btn-principal" onclick="subirMaterial()">AÑADIR AL TALLER</button>
                <button id="btn-cancelar" style="display:none; background: #999; margin-top:10px;" class="btn-principal" onclick="cancelarEdicion()">CANCELAR</button>
            </div>
            <div id="lista-stock" class="grid-estudio"></div>
        </div>

        <div id="seccion-proyectos" style="display:none;">
            <div class="seccion-diseno">
                <h2 style="text-align:center; color:var(--secundario)">✨ BOCETO CREATIVO</h2>
                <input type="text" id="p-nombre" placeholder="Nombre del Diseño">
                <textarea id="p-notas" placeholder="Inspiración, detalles..."></textarea>
                <div class="canvas-wrapper"><img id="silueta-estudio" src="Silueta 3 cuerpos.jpg"><canvas id="lienzo" width="400" height="530"></canvas></div>
                <div style="display:flex; gap:10px; margin-bottom:20px"><input type="color" id="pincel-color" value="#ff85a2" style="width:70px; height: 45px;"><button onclick="limpiarLienzo()" style="flex:1; border-radius: 12px; border: 1px solid var(--borde);">Borrar</button></div>
                <button class="btn-principal" onclick="guardarProyectoCompleto()">GUARDAR DISEÑO</button>
            </div>
            <div id="historial-proyectos" class="grid-estudio"></div>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let stockLocal = [];
    let secciones = [];
    let vistaActual = 'INICIO';
    let filtroActual = 'TODOS';
    let editandoId = null;
    const canvas = document.getElementById('lienzo');
    const ctx = canvas.getContext('2d');
    let pintando = false;

    function obtenerEmoji(nombreCat) {
        const n = nombreCat.toLowerCase();
        if (n.includes('lana')) return '🧶';
        if (n.includes('tela')) return '👗';
        if (n.includes('hilo')) return '🧵';
        if (n.includes('accesorio')) return '🎀';
        return '🌸';
    }

    async function init() {
        const { data } = await client.from('Secciones').select('nombre');
        secciones = data ? data.map(s => s.nombre) : [];
        renderFiltros();
        renderSelect();
        await cargarStock();
        setupDibujo();
        cambiarVista('INICIO');
    }

    function renderFiltros() {
        let html = `<button class="btn-filtro ${filtroActual === 'TODOS' ? 'active' : ''}" onclick="filtrarMateriales('TODOS')">✨ Todo</button>`;
        secciones.forEach(s => {
            html += `<button class="btn-filtro ${filtroActual === s ? 'active' : ''}" onclick="filtrarMateriales('${s}')">${obtenerEmoji(s)} ${s}</button>`;
        });
        document.getElementById('contenedor-filtros').innerHTML = html;
    }

    function renderSelect() {
        const sel = document.getElementById('m-categoria');
        sel.innerHTML = secciones.map(s => `<option value="${s}">${s}</option>`).join('');
        mostrarCamposExtra(sel.value);
    }

    function mostrarCamposExtra(cat) {
        document.getElementById('campos-lana').style.display = (cat.toLowerCase().includes('lana')) ? 'block' : 'none';
    }

    async function cargarStock() {
        const { data } = await client.from('estudio_data').select('*').order('created_at', { ascending: false });
        stockLocal = data || [];
        renderStock(stockLocal);
    }

    function renderStock(items) {
        document.getElementById('lista-stock').innerHTML = items.map(m => {
            let infoExtra = "";
            if (m.notas && m.categoria.toLowerCase().includes('lana')) {
                const partes = m.notas.split(' | ');
                infoExtra = `
                    <div style="font-size: 11px; color: #777; margin-top: 8px; text-align: left; background: #fffafb; padding: 8px; border-radius: 10px; border: 1px solid #fce4ec;">
                        <div>✨ <b>Comp:</b> ${partes[0] || '-'}</div>
                        <div>📏 <b>Grosor:</b> ${partes[1] || '-'}</div>
                        <div>🛍️ <b>Tienda:</b> ${partes[2] || '-'}</div>
                        <div style="margin-top:5px; color:var(--secundario); font-weight:bold;">${partes[3] || '🏠 En espera'}</div>
                    </div>`;
            }
            return `
            <div class="item-card">
                <button class="btn-eliminar" onclick="eliminarProducto(${m.id})">×</button>
                <button class="btn-editar" onclick="editarMaterial(${m.id})">✏️</button>
                <img src="${m.contenido || 'https://via.placeholder.com/150'}" onerror="this.src='https://via.placeholder.com/150'">
                <div style="padding: 10px 5px">
                    <strong style="font-size: 14px">${m.tipo_material}</strong>
                    ${infoExtra}
                    <div class="controles-stock">
                        <button class="btn-qty" onclick="actualizarCant(${m.id},-1)">-</button>
                        <span>${m.cantidad || 0}</span>
                        <button class="btn-qty" onclick="actualizarCant(${m.id},1)">+</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function cambiarVista(v) {
        vistaActual = v;
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById(`nav-${v}`).classList.add('active');
        document.getElementById('seccion-stock').style.display = (v === 'PROYECTOS') ? 'none' : 'block';
        document.getElementById('seccion-proyectos').style.display = (v === 'PROYECTOS') ? 'block' : 'none';
        document.getElementById('formulario-registro').style.display = (v === 'INICIO') ? 'block' : 'none';
        document.getElementById('contenedor-filtros').style.display = (v === 'MATERIALES') ? 'flex' : 'none';
        if (v === 'MATERIALES') filtrarMateriales('TODOS');
        if (v === 'PROYECTOS') cargarHistorial();
    }

    function editarMaterial(id) {
        const m = stockLocal.find(x => x.id === id);
        if (!m) return;
        
        editandoId = id;
        cambiarVista('INICIO');
        document.getElementById('formulario-registro').style.display = 'block';
        document.getElementById('form-titulo').innerText = "✏️ Editando Material";
        document.getElementById('btn-guardar').innerText = "GUARDAR CAMBIOS";
        document.getElementById('btn-cancelar').style.display = "block";
        
        document.getElementById('m-nombre').value = m.tipo_material;
        document.getElementById('m-cantidad').value = m.cantidad;
        document.getElementById('m-categoria').value = m.categoria;
        
        mostrarCamposExtra(m.categoria);
        
        if(m.categoria.toLowerCase().includes('lana')) {
            const partes = m.notas ? m.notas.split(' | ') : [];
            document.getElementById('m-composicion').value = partes[0] || '';
            document.getElementById('m-grosor').value = partes[1] || '';
            document.getElementById('m-tienda').value = partes[2] || '';
            document.getElementById('m-estado-uso').value = partes[3] || '🏠 En espera';
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelarEdicion() {
        editandoId = null;
        location.reload();
    }

    async function filtrarMateriales(cat) {
        filtroActual = cat;
        renderFiltros();
        renderStock(cat === 'TODOS' ? stockLocal : stockLocal.filter(i => i.categoria === cat));
    }

    async function actualizarCant(id, d) {
        const i = stockLocal.find(x => x.id === id);
        const nc = Math.max(0, (i.cantidad || 0) + d);
        await client.from('estudio_data').update({ cantidad: nc }).eq('id', id);
        i.cantidad = nc;
        filtrarMateriales(filtroActual);
    }

    async function eliminarProducto(id) {
        if(confirm("¿Eliminar material?")) {
            await client.from('estudio_data').delete().eq('id', id);
            stockLocal = stockLocal.filter(x => x.id !== id);
            filtrarMateriales(filtroActual);
        }
    }

    async function subirMaterial() {
        const nombre = document.getElementById('m-nombre').value;
        const categoria = document.getElementById('m-categoria').value;
        const fotoFile = document.getElementById('m-foto').files[0];
        if (!nombre) return alert("Falta el nombre");

        let notasFinales = "";
        if(categoria.toLowerCase().includes('lana')) {
            notasFinales = `${document.getElementById('m-composicion').value || '-'} | ${document.getElementById('m-grosor').value || '-'} | ${document.getElementById('m-tienda').value || '-'} | ${document.getElementById('m-estado-uso').value}`;
        }

        let fotoUrl = "";
        if (fotoFile) {
            const fileName = `img_${Date.now()}`;
            let { data } = await client.storage.from('media').upload(fileName, fotoFile);
            if (data) fotoUrl = client.storage.from('media').getPublicUrl(fileName).data.publicUrl;
        }

        const payload = {
            tipo_material: nombre, 
            cantidad: parseInt(document.getElementById('m-cantidad').value),
            categoria: categoria, 
            notas: notasFinales
        };
        if (fotoUrl) payload.contenido = fotoUrl;

        if(editandoId) {
            await client.from('estudio_data').update(payload).eq('id', editandoId);
        } else {
            await client.from('estudio_data').insert([payload]);
        }
        location.reload();
    }

    function setupDibujo() {
        const getP = (e) => {
            const r = canvas.getBoundingClientRect();
            const x = (e.clientX || (e.touches ? e.touches[0].clientX : 0)) - r.left;
            const y = (e.clientY || (e.touches ? e.touches[0].clientY : 0)) - r.top;
            return { x, y };
        };
        canvas.onmousedown = (e) => { pintando = true; ctx.beginPath(); ctx.strokeStyle = document.getElementById('pincel-color').value; ctx.lineWidth = 4; const p = getP(e); ctx.moveTo(p.x, p.y); };
        canvas.onmousemove = (e) => { if(pintando) { const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } };
        window.onmouseup = () => pintando = false;
        canvas.ontouchstart = (e) => { e.preventDefault(); pintando = true; ctx.beginPath(); ctx.strokeStyle = document.getElementById('pincel-color').value; ctx.lineWidth = 4; const p = getP(e); ctx.moveTo(p.x, p.y); };
        canvas.ontouchmove = (e) => { e.preventDefault(); if(pintando) { const p = getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); } };
    }

    function limpiarLienzo() { ctx.clearRect(0,0,400,530); }

    async function guardarProyectoCompleto() {
        const nom = document.getElementById('p-nombre').value;
        if(!nom) return alert("Falta el nombre");
        await client.from('Proyectos').insert([{ nombre: nom, diseno_canvas: canvas.toDataURL(), patron_punto: document.getElementById('p-notas').value }]);
        alert("¡Guardado!"); cambiarVista('PROYECTOS');
    }

    async function cargarHistorial() {
        const { data } = await client.from('Proyectos').select('*').order('created_at', { ascending: false });
        document.getElementById('historial-proyectos').innerHTML = (data || []).map(p => `
            <div class="item-card"><img src="${p.diseno_canvas}"><strong>${p.nombre}</strong></div>`).join('');
    }

    function toggleTheme() {
        const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
        document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.getElementById('themeBtn').innerText = isDark ? '☀️' : '🌙';
    }

    init();
</script>
</body>
</html>
