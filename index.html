<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --br: #f1e1e5; --txt: #444; 
        }
        [data-theme="dark"] {
            --p: #ff85a2; --pc: #4a2b34; --s: #f06292; --f: #121212; --b: #1e1e1e; --br: #333333; --txt: #fce4ec;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--txt); margin: 0; padding: 15px; padding-bottom: 80px; transition: 0.3s; }
        
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 50px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow-x: auto; scrollbar-width: none; }
        .btn-nav { flex: 1; padding: 10px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 40px; font-size: 10px; text-transform: uppercase; white-space: nowrap; }
        .btn-nav.active { background: var(--pc); color: var(--s); border: 1px solid var(--p); }

        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px; }
        .item-card { background: var(--b); border-radius: 18px; border: 1px solid var(--br); overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 300px; }
        
        .card-form { background: var(--b); padding: 20px; border-radius: 25px; border: 1px solid var(--br); max-width: 500px; margin: 0 auto; margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--s); font-weight: 700; margin: 10px 0 4px 4px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--br); box-sizing: border-box; font-size: 14px; background: var(--f); color: var(--txt); }
        .btn-grande { width: 100%; background: var(--p); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }

        /* EL CORAZÓN DEL PROBLEMA CORREGIDO AQUÍ */
        .canvas-container { background: white; border: 1px solid var(--br); border-radius: 15px; margin-top: 10px; position: relative; overflow: hidden; }
        .canvas-base { display: block; width: 100%; height: 350px; cursor: crosshair; }
        
        .canvas-grid { 
            background-image: linear-gradient(to right, rgba(240, 98, 146, 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(240, 98, 146, 0.1) 1px, transparent 1px); 
            background-size: 20px 20px; 
        }
        
        .canvas-cuerpos {
            background-image: url('https://i.ibb.co/6R0n7Ym/Silueta-3-cuerpos-7.jpg');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            background-color: #ffffff;
        }

        .canvas-tools { display: flex; gap: 5px; margin-top: 5px; margin-bottom: 15px; }
        .btn-tool { flex: 1; padding: 8px; font-size: 12px; border: 1px solid var(--br); border-radius: 8px; background: var(--b); cursor: pointer; color: var(--txt); }
        .btn-tool.active { background: var(--pc); border-color: var(--p); color: var(--s); }

        #dark-mode-toggle { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; border-radius: 50%; border: none; background: var(--p); color: white; font-size: 24px; cursor: pointer; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<button id="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>

<div class="menu-secciones">
    <button class="btn-nav" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 INICIO</button>
    <button class="btn-nav" id="nav-STOCK" onclick="cambiarVista('STOCK')">📦 STOCK</button>
    <button class="btn-nav" id="nav-COMPRAS" onclick="cambiarVista('COMPRAS')">🛒 COMPRAS</button>
    <button class="btn-nav active" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 PROYECTOS</button>
</div>

<div id="vista-PROYECTOS">
    <div class="card-form">
        <h2 style="color:var(--s); text-align:center; margin-top:0;">✨ Nuevo Proyecto</h2>
        
        <label>DIBUJO DEL PUNTO / ESQUEMA</label>
        <div class="canvas-container">
            <canvas id="canvas-punto" class="canvas-base canvas-grid"></canvas>
        </div>
        <div class="canvas-tools">
            <button class="btn-tool active" id="tool-pincel-punto" onclick="setTool('canvas-punto', 'pincel')">🖌️ Pincel</button>
            <button class="btn-tool" id="tool-goma-punto" onclick="setTool('canvas-punto', 'goma')">🧽 Goma</button>
            <button class="btn-tool" onclick="limpiarCanvas('canvas-punto')">🗑️</button>
        </div>

        <label>DISEÑO SOBRE CUERPOS</label>
        <div class="canvas-container">
            <canvas id="canvas-cuerpos" class="canvas-base canvas-cuerpos"></canvas>
        </div>
        <div class="canvas-tools">
            <button class="btn-tool active" id="tool-pincel-cuerpos" onclick="setTool('canvas-cuerpos', 'pincel')">🖌️ Pincel</button>
            <button class="btn-tool" id="tool-goma-cuerpos" onclick="setTool('canvas-cuerpos', 'goma')">🧽 Goma</button>
            <button class="btn-tool" onclick="limpiarCanvas('canvas-cuerpos')">🗑️</button>
        </div>

        <button class="btn-grande">CREAR PROYECTO</button>
    </div>
</div>

<script>
    let toolsState = { 'canvas-punto': 'pincel', 'canvas-cuerpos': 'pincel' };

    function iniciarCanvas(id) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext('2d');
        
        // Ajustar resolución del dibujo
        canvas.width = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        let painting = false;

        function startPosition(e) {
            painting = true;
            draw(e);
        }

        function finishedPosition() {
            painting = false;
            ctx.beginPath();
        }

        function draw(e) {
            if (!painting) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.touches[0].clientX) - rect.left;
            const y = (e.clientY || e.touches[0].clientY) - rect.top;

            ctx.lineWidth = toolsState[id] === 'goma' ? 20 : 3;
            ctx.lineCap = 'round';
            
            // Si es goma, "borra"; si es pincel, pinta en color rosa
            ctx.globalCompositeOperation = toolsState[id] === 'goma' ? 'destination-out' : 'source-over';
            ctx.strokeStyle = '#f06292';

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        canvas.addEventListener('mousedown', startPosition);
        canvas.addEventListener('mouseup', finishedPosition);
        canvas.addEventListener('mousemove', draw);
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startPosition(e); });
        canvas.addEventListener('touchend', finishedPosition);
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); });
    }

    function setTool(id, t) {
        toolsState[id] = t;
        const section = id.split('-')[1];
        document.getElementById(`tool-pincel-${section}`).classList.toggle('active', t === 'pincel');
        document.getElementById(`tool-goma-${section}`).classList.toggle('active', t === 'goma');
    }

    function limpiarCanvas(id) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    window.onload = () => {
        iniciarCanvas('canvas-punto');
        iniciarCanvas('canvas-cuerpos');
    };

    function toggleDarkMode() {
        document.body.toggleAttribute('data-theme');
    }
    
    function cambiarVista(v) {
        alert("Cambiando a " + v + "... (Esta es una demo del lienzo)");
    }
</script>
</body>
</html>
