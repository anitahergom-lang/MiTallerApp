<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primario: #ff85a2; --primario-claro: #fce4ec; --secundario: #f06292; --fondo: #fcf8f9; --blanco: #ffffff; --texto: #4a4a4a; --borde: #f1e1e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); color: var(--texto); margin: 0; padding: 15px; }
        
        .menu-secciones { display: flex; gap: 8px; background: var(--blanco); padding: 8px; border-radius: 20px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--borde); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-nav { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 15px; font-size: 10px; text-transform: uppercase; }
        .btn-nav.active { background: var(--primario-claro); color: var(--secundario); border-bottom: 3px solid var(--secundario); }

        .filtros-materiales { display: flex; gap: 10px; overflow-x: auto; padding: 5px 5px 15px 5px; margin-bottom: 10px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .btn-filtro { padding: 10px 18px; border-radius: 25px; border: 1px solid var(--borde); background: var(--blanco); white-space: nowrap; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 8px; color: var(--texto); box-shadow: 0 2px 5px rgba(0,0,0,0.03); }
        .btn-filtro.active { background: var(--secundario); color: white; border-color: var(--secundario); }

        .grid-estudio { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .item-card { background: var(--blanco); padding: 12px; border-radius: 20px; border: 1px solid var(--borde); text-align: center; position: relative; }
        .item-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 15px; margin-bottom: 8px; }
        
        .nombre-producto { font-weight: bold; font-size: 13px; margin-bottom: 8px; display: block; height: 32px; overflow: hidden; }
        .controles-stock { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-qty { width: 35px; height: 35px; border-radius: 10px; border: none; background: var(--primario-claro); color: var(--secundario); font-weight: bold; cursor: pointer; font-size: 18px; }
        
        .btn-editar { position: absolute; top: -5px; left: -5px; background: #FFC107; border: 2px solid white; border-radius: 50%; width: 28px; height: 28px; color: white; cursor: pointer; z-index: 5; font-size: 12px; }
        .btn-eliminar { position: absolute; top: -5px; right: -5px; background: #ff5252; border: 2px solid white; border-radius: 50%; width: 28px; height: 28px; color: white; cursor: pointer; z-index: 5; font-size: 12px; }
        
        .card-registro { background: var(--blanco); padding: 20px; border-radius: 25px; border: 1px solid var(--borde); max-width: 450px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--borde); border-radius: 12px; box-sizing: border-box; font-size: 14px; }
        .btn-principal { background: var(--primario); color: white; padding: 15px; border: none; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="menu-secciones">
        <button class="btn-nav active" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 Inicio</button>
        <button class="btn-nav" id="nav-MATERIALES" onclick="cambiarVista('MATERIALES')">📦 Materiales</button>
        <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 Proyectos</button>
    </div>

    <div id="contenedor-filtros" class="filtros-materiales" style="display:none;"></div>

    <div id="seccion-registro" class="card-registro">
        <h3 id="titulo-form" style="margin-top:0; color:var(--secundario); text-align:center;">✨ Nuevo Material</h3>
        <input type="text" id="m-nombre" placeholder="Nombre (ej: Lana Azul)">
        <select id="m-categoria"></select>
        <input type="number" id="m-cantidad" placeholder="Cantidad" value="1">
        <input type="file" id="m-foto" accept="image/*">
        <button id="btn-guardar" class="btn-principal" onclick="guardar()">AÑADIR AL TALLER</button>
    </div>

    <div id="seccion-listado" style="display:none;">
        <div id="lista-stock" class="grid-estudio"></div>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let stockGlobal = [];
    let categoriasBase = [];
    let editandoId = null;

    // Lógica forzada de Emojis
    function darEmoji(txt) {
        const t = txt.toLowerCase();
        if (t.includes("lana")) return "🧶";
        if (t.includes("tela")) return "👗";
        if (t.includes("hilo")) return "🧵";
        if (t.includes("accesorio")) return "🎀";
        if (t.includes("otro")) return "🧸";
        return "✨"; 
    }

    async function iniciar() {
        const { data: catData } = await client.from('Secciones').select('nombre');
        categoriasBase = catData ? catData.map(c => c.nombre.trim()) : [];
        
        const sel = document.getElementById('m-categoria');
        sel.innerHTML = categoriasBase.map(c => `<option value="${c}">${darEmoji(c)} ${c}</option>`).join('');

        await cargarDatos();
        renderFiltros();
    }

    async function cargarDatos() {
        const { data } = await client.from('estudio_data').select('*').order('created_at', { ascending: false });
        stockGlobal = data || [];
        renderStock(stockGlobal);
    }

    function renderStock(lista) {
        const contenedor = document.getElementById('lista-stock');
        contenedor.innerHTML = lista.map(m => `
            <div class="item-card">
                <button class="btn-editar" onclick="prepararEdicion(${m.id})">✏️</button>
                <button class="btn-eliminar" onclick="eliminar(${m.id})">×</button>
                <img src="${m.contenido || 'https://via.placeholder.com/150/fce4ec/888?text=Sin+Foto'}">
                <span class="nombre-producto">${m.tipo_material}</span>
                <div class="controles-stock">
                    <button class="btn-qty" onclick="actualizarCant(${m.id}, -1)">-</button>
                    <span style="font-weight:bold;">${m.cantidad || 0}</span>
                    <button class="btn-qty" onclick="actualizarCant(${m.id}, 1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function renderFiltros() {
        const contenedor = document.getElementById('contenedor-filtros');
        let html = `<button class="btn-filtro active" onclick="filtrar('TODO', this)">✨ Todo</button>`;
        categoriasBase.forEach(cat => {
            html += `<button class="btn-filtro" onclick="filtrar('${cat}', this)"><span>${darEmoji(cat)}</span> ${cat}</button>`;
        });
        contenedor.innerHTML = html;
    }

    function filtrar(busqueda, boton) {
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
        boton.classList.add('active');
        if (busqueda === 'TODO') {
            renderStock(stockGlobal);
        } else {
            renderStock(stockGlobal.filter(p => p.categoria === busqueda));
        }
    }

    function cambiarVista(vista) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + vista).classList.add('active');
        document.getElementById('seccion-registro').style.display = (vista === 'INICIO' ? 'block' : 'none');
        document.getElementById('seccion-listado').style.display = (vista === 'MATERIALES' ? 'block' : 'none');
        document.getElementById('contenedor-filtros').style.display = (vista === 'MATERIALES' ? 'flex' : 'none');
        if(vista === 'MATERIALES') cargarDatos();
    }

    async function actualizarCant(id, cambio) {
        const item = stockGlobal.find(x => x.id === id);
        const nuevaCant = Math.max(0, (item.cantidad || 0) + cambio);
        item.cantidad = nuevaCant;
        renderStock(stockGlobal);
        await client.from('estudio_data').update({ cantidad: nuevaCant }).eq('id', id);
    }

    async function guardar() {
        const nombre = document.getElementById('m-nombre').value;
        const cat = document.getElementById('m-categoria').value;
        const cant = document.getElementById('m-cantidad').value;
        if (!nombre) return alert("Escribe un nombre");

        const payload = { tipo_material: nombre, categoria: cat, cantidad: parseInt(cant) || 0 };
        const foto = document.getElementById('m-foto').files[0];
        
        if (foto) {
            const name = `img_${Date.now()}`;
            await client.storage.from('media').upload(name, foto);
            payload.contenido = client.storage.from('media').getPublicUrl(name).data.publicUrl;
        }

        if (editandoId) await client.from('estudio_data').update(payload).eq('id', editandoId);
        else await client.from('estudio_data').insert([payload]);
        
        location.reload();
    }

    function prepararEdicion(id) {
        const m = stockGlobal.find(x => x.id === id);
        editandoId = id;
        cambiarVista('INICIO');
        document.getElementById('m-nombre').value = m.tipo_material;
        document.getElementById('m-categoria').value = m.categoria;
        document.getElementById('m-cantidad').value = m.cantidad;
        document.getElementById('btn-guardar').innerText = "GUARDAR CAMBIOS";
    }

    async function eliminar(id) {
        if(confirm("¿Eliminar?")) {
            await client.from('estudio_data').delete().eq('id', id);
            cargarDatos();
        }
    }

    iniciar();
</script>
</body>
</html>
