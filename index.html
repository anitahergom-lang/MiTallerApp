    // FUNCIÓN ACTUALIZADA: Ahora guarda la preferencia
    function toggleDarkMode() {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        
        // Aplicar el tema
        document.documentElement.setAttribute('data-theme', newTheme);
        document.getElementById('dark-mode-toggle').innerText = newTheme === 'dark' ? '☀️' : '🌙';
        
        // GUARDAR la preferencia en el navegador
        localStorage.setItem('tema-preferido', newTheme);
    }

    // FUNCIÓN DE CARGA: Ahora recupera la preferencia al abrir la app
    window.onload = function() {
        // 1. Recuperar el tema guardado
        const temaGuardado = localStorage.getItem('tema-preferido');
        
        // 2. Si el usuario tenía puesto el modo oscuro, aplicarlo de inmediato
        if (temaGuardado === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            const toggleBtn = document.getElementById('dark-mode-toggle');
            if(toggleBtn) toggleBtn.innerText = '☀️';
        }

        // 3. Cargar el resto de los datos de la app [cite: 313]
        cargarDatos();
    };
