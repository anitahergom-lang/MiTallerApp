<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --br: #f1e1e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); margin: 0; padding: 15px; padding-bottom: 80px; }
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 50px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-nav { flex: 1; padding: 10px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 40px; font-size: 10px; text-transform: uppercase; }
        .btn-nav.active { background: var(--pc); color: var(--s); border: 1px solid var(--p); }
        .filtros-container { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 15px 0; scrollbar-width: none; }
        .btn-filtro { white-space: nowrap; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--br); background: white; color: #666; font-size: 12px; cursor: pointer; font-weight: 600; }
        .btn-filtro.active { background: var(--p); color: white; border-color: var(--p); }
        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px; }
        .item-card { background: var(--b); border-radius: 18px; border: 1px solid var(--br); overflow: hidden; position: relative; }
        .foto-material { width: 100%; height: 110px; object-fit: cover; }
        .info-material { padding: 10px; text-align: center; }
        .info-material h4 { margin: 0 0 8px 0; color: #444; font-size: 13px; font-weight: 700; }
        .controles-stock { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 5px; }
        .btn-qty { background: var(--pc); color: var(--s); border: none; width: 30px; height: 30px; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; }
        .qty-num { font-weight: bold; font-size: 14px; color: #333; }
        
        /* Formulario Detallado */
        .card-form { background: white; padding: 20px; border-radius: 25px; border: 1px solid var(--br); max-width: 500px; margin: 0 auto; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; color: var(--s); font-weight: 700; margin-bottom: 5px; margin-left: 5px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #eee; box-sizing: border-box; font-family: inherit; font-size: 14px; background: var(--f); }
        textarea { resize: none; height: 80px; }
        .btn-grande { width: 100%; background: var(--p); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; box-shadow: 0 4px 10px rgba(255,133,162,0.3); }
    </style>
</head>
<body>

    <div class="menu-secciones">
        <button class="btn-nav" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 INICIO</button>
        <button class="btn-nav active" id="nav-STOCK" onclick="cambiarVista('STOCK')">📦 STOCK</button>
        <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 PROYECTOS</button>
    </div>

    <!-- SECCIÓN STOCK -->
    <div id="vista-STOCK">
        <div class="filtros-container">
            <button class="btn-filtro active" onclick="filtrar('Todo')">✨ Todo</button>
            <button class="btn-filtro" onclick="filtrar('Lana')">🧶 Lana</button>
            <button class="btn-filtro" onclick="filtrar('Telas')">👗 Telas</button>
            <button class="btn-filtro" onclick="filtrar('Hilos')">🧵 Hilos</button>
            <button class="btn-filtro" onclick="filtrar('Accesorios')">🎀 Accesorios</button>
            <button class="btn-filtro" onclick="filtrar('Otros')">🧸 Otros</button>
        </div>
        <div id="lista-stock" class="grid-estudio"></div>
    </div>

    <!-- SECCIÓN INICIO (FORMULARIO COMPLETO) -->
    <div id="vista-INICIO" style="display:none;">
        <div class="card-form">
            <h2 style="color:var(--s); text-align:center; margin-top:0;">✨ Nuevo Material</h2>
            
            <div class="form-group">
                <label>NOMBRE DEL MATERIAL</label>
                <input type="text" id="m-nombre" placeholder="Ej: Mega Ball Peacocks">
            </div>

            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;">
                    <label>CATEGORÍA</label>
                    <select id="m-categoria">
                        <option value="Lana">🧶 Lana</option>
                        <option value="Telas">👗 Telas</option>
                        <option value="Hilos">🧵 Hilos</option>
                        <option value="Accesorios">🎀 Accesorios</option>
                        <option value="Otros">🧸 Otros</option>
                    </select>
                </div>
                <div class="form-group" style="width:100px;">
                    <label>CANTIDAD</label>
                    <input type="number" id="m-cantidad" value="1">
                </div>
            </div>

            <div style="display:flex; gap:10px;">
                <div class="form-group" style="flex:1;">
                    <label>GROSOR</label>
                    <input type="text" id="m-grosor" placeholder="Ej: 4-ply / DK">
                </div>
                <div class="form-group" style="flex:1;">
                    <label>COMPOSICIÓN</label>
                    <input type="text" id="m-composicion" placeholder="Ej: 100% Algodón">
                </div>
            </div>

            <div class="form-group">
                <label>¿DÓNDE SE COMPRÓ?</label>
                <input type="text" id="m-tienda" placeholder="Nombre de la tienda o web">
            </div>

            <div class="form-group">
                <label>FOTO (URL OPCIONAL)</label>
                <input type="text" id="m-foto" placeholder="Pega el enlace de la foto">
            </div>

            <div class="form-group">
                <label>NOTAS ADICIONALES</label>
                <textarea id="m-notas" placeholder="Algo importante que recordar..."></textarea>
            </div>

            <button class="btn-grande" onclick="guardarNuevo()">GUARDAR EN MI TALLER</button>
        </div>
    </div>

    <!-- SECCIÓN PROYECTOS -->
    <div id="vista-PROYECTOS" style="display:none;">
        <div style="text-align:center; padding:50px; color:#888;">
            <h2>🎨 Mis Proyectos</h2>
            <p>Zona para planificar tus creaciones.</p>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let lanasGlobal = [];

    async function cargarDatos() {
        const { data } = await client.from('estudio_data').select('*').order('created_at', {ascending: false});
        lanasGlobal = data || [];
        renderizar(lanasGlobal);
    }

    function renderizar(lista) {
        document.getElementById('lista-stock').innerHTML = lista.map(m => `
            <div class="item-card">
                <img src="${m.contenido || 'https://via.placeholder.com/150?text=Sin+Foto'}" class="foto-material">
                <div class="info-material">
                    <h4>${m.tipo_material}</h4>
                    <div class="controles-stock">
                        <button class="btn-qty" onclick="cambiarStock(${m.id}, -1)">-</button>
                        <span class="qty-num">${m.cantidad}</span>
                        <button class="btn-qty" onclick="cambiarStock(${m.id}, 1)">+</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function cambiarStock(id, n) {
        const item = lanasGlobal.find(m => m.id === id);
        await client.from('estudio_data').update({ cantidad: Math.max(0, (item.cantidad || 0) + n) }).eq('id', id);
        cargarDatos();
    }

    async function guardarNuevo() {
        const datos = {
            tipo_material: document.getElementById('m-nombre').value,
            categoria: document.getElementById('m-categoria').value,
            cantidad: parseInt(document.getElementById('m-cantidad').value),
            contenido: document.getElementById('m-foto').value,
            // Guardamos los campos extra en notas o columnas si existen
            notas: `Grosor: ${document.getElementById('m-grosor').value} | Comp: ${document.getElementById('m-composicion').value} | Tienda: ${document.getElementById('m-tienda').value} | Notas: ${document.getElementById('m-notas').value}`
        };

        if(!datos.tipo_material) return alert("¡El nombre es obligatorio!");

        await client.from('estudio_data').insert([datos]);
        alert("¡Material guardado con éxito! 💖");
        
        // Limpiar campos
        document.getElementById('m-nombre').value = "";
        document.getElementById('m-foto').value = "";
        document.getElementById('m-notas').value = "";
        
        cambiarVista('STOCK');
    }

    function cambiarVista(v) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + v).classList.add('active');
        document.getElementById('vista-STOCK').style.display = v === 'STOCK' ? 'block' : 'none';
        document.getElementById('vista-INICIO').style.display = v === 'INICIO' ? 'block' : 'none';
        document.getElementById('vista-PROYECTOS').style.display = v === 'PROYECTOS' ? 'block' : 'none';
        if(v === 'STOCK') cargarDatos();
    }

    function filtrar(cat) {
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.toggle('active', b.innerText.includes(cat)));
        renderizar(cat === 'Todo' ? lanasGlobal : lanasGlobal.filter(m => m.categoria === cat));
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
