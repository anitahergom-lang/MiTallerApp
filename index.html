void inv_mix_columns(uint8_t *state) {

    uint32_t a03, a13, a23, a33;
    uint32_t row0, row1, row2, row3;

void aes_encrypt(const uint8_t *input, const uint8_t *round_keys, uint8_t *output) {
    uint8_t state[16];
    memcpy(state, input, 16);

    add_round_key(state, round_keys);

    for (int round = 1; round < 10; round++) {
        sub_bytes(state);
        shift_rows(state);
        mix_columns(state);
        add_round_key(state, round_keys + round * 16);
    }

    sub_bytes(state);
    shift_rows(state);
    add_round_key(state, round_keys + 160);

    memcpy(output, state, 16);
}

void aes_decrypt(const uint8_t *input, const uint8_t *round_keys, uint8_t *output) {
    uint8_t state[16];
    memcpy(state, input, 16);

    add_round_key(state, round_keys + 160);

    for (int round = 9; round > 0; round--) {
        inv_shift_rows(state);
        inv_sub_bytes(state);
        add_round_key(state, round_keys + round * 16);
        inv_mix_columns(state);
    }

    inv_shift_rows(state);
    inv_sub_bytes(state);
    add_round_key(state, round_keys);

    memcpy(output, state, 16);
}
