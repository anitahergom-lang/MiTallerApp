<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { 
            --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --br: #f1e1e5; --txt: #444; 
        }
        [data-theme="dark"] {
            --p: #ff85a2; --pc: #4a2b34; --s: #f06292; --f: #121212; --b: #1e1e1e; --br: #333333; --txt: #fce4ec;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--txt); margin: 0; padding: 15px; padding-bottom: 80px; transition: 0.3s; }
        
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 50px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow-x: auto; scrollbar-width: none; }
        .btn-nav { flex: 1; padding: 10px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 40px; font-size: 10px; text-transform: uppercase; white-space: nowrap; }
        .btn-nav.active { background: var(--pc); color: var(--s); border: 1px solid var(--p); }

        .filtros-container { display: flex; gap: 8px; overflow-x: auto; padding: 5px 0 15px 0; scrollbar-width: none; }
        .btn-filtro { white-space: nowrap; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--br); background: var(--b); color: var(--txt); font-size: 12px; cursor: pointer; font-weight: 600; }
        .btn-filtro.active { background: var(--p); color: white; border-color: var(--p); }

        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px; }
        .item-card { background: var(--b); border-radius: 18px; border: 1px solid var(--br); overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 300px; }
        .foto-material { width: 100%; height: 110px; object-fit: cover; background: #eee; }
        .info-material { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; gap: 4px; color: var(--txt); }
        
        .info-titulo { font-size: 13px; font-weight: 700; color: var(--s); margin: 0 0 4px 0; line-height: 1.2; display: block; }
        .info-detalle { font-size: 10px; color: var(--txt) !important; margin: 0; line-height: 1.3; display: block; }
        .info-label { font-weight: 800; text-transform: uppercase; font-size: 8px; color: var(--s); opacity: 0.8; margin-right: 4px; }
        .info-notas { font-size: 9px; font-style: italic; color: var(--txt); opacity: 0.8; margin-top: 5px; padding-top: 5px; border-top: 1px dashed var(--br); width: 100%; }

        .btn-edit-float { position: absolute; top: 10px; right: 10px; background: rgba(0, 0, 0, 0.6); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; z-index: 5; }
        .btn-delete-float { position: absolute; top: 10px; left: 10px; background: rgba(255, 0, 0, 0.6); color: white; border: none; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 12px; z-index: 5; }

        .badge { display: inline-block; padding: 3px 8px; border-radius: 10px; font-size: 10px; font-weight: bold; margin-top: 5px; }
        .badge-idea { background: #e2e3e5; color: #383d41; }
        .badge-proceso { background: #fff3cd; color: #856404; }
        .badge-listo { background: #d4edda; color: #155724; }

        .card-form { background: var(--b); padding: 20px; border-radius: 25px; border: 1px solid var(--br); max-width: 500px; margin: 0 auto; margin-bottom: 20px; }
        label { display: block; font-size: 11px; color: var(--s); font-weight: 700; margin: 10px 0 4px 4px; }
        input, select, textarea { width: 100%; padding: 10px; border-radius: 10px; border: 1px solid var(--br); box-sizing: border-box; font-size: 14px; background: var(--f); color: var(--txt); }
        textarea { height: 80px; resize: none; }
        .btn-grande { width: 100%; background: var(--p); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }

        .compra-item { background: var(--b); padding: 15px; border-radius: 18px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--br); }
        .prio-Alta { border-left: 6px solid #ff4d4d !important; }
        .prio-Media { border-left: 6px solid #ffcc00 !important; }
        .prio-Baja { border-left: 6px solid #2ecc71 !important; }

        .canvas-container { background: white; border: 1px solid var(--br); border-radius: 15px; margin-top: 10px; position: relative; overflow: hidden; }
        .canvas-base { display: block; width: 100%; height: 250px; cursor: crosshair; }
        .canvas-largo { height: 500px !important; }
        .canvas-grid { background-image: linear-gradient(to right, rgba(240, 98, 146, 0.1) 1px, transparent 1px), linear-gradient(to bottom, rgba(240, 98, 146, 0.1) 1px, transparent 1px); background-size: 20px 20px; }
        .canvas-cuerpos { background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 600' opacity='0.3'><g fill='none' stroke='%23f06292' stroke-width='1.5'><path d='M100,100 Q100,50 125,50 Q150,50 150,100 L150,150 L180,180 L180,250 L160,400 L170,550 M100,150 L70,180 L70,250 L90,400 L80,550'/><path d='M300,100 Q300,50 325,50 Q350,50 350,100 L350,150 L380,180 L380,250 L360,400 L370,550 M300,150 L270,180 L270,250 L290,400 L280,550'/><path d='M200,80 Q200,40 225,40 Q250,40 250,80 L250,130 L280,160 L280,230 L260,380 L270,530 M200,130 L170,160 L170,230 L190,380 L180,530'/></g></svg>"); background-size: contain; background-repeat: no-repeat; background-position: center; }

        .canvas-tools { display: flex; gap: 5px; margin-top: 5px; margin-bottom: 15px; }
        .btn-tool { flex: 1; padding: 8px; font-size: 12px; border: 1px solid var(--br); border-radius: 8px; background: var(--b); cursor: pointer; color: var(--txt); }
        .btn-tool.active { background: var(--pc); border-color: var(--p); color: var(--s); }

        #dark-mode-toggle { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; border-radius: 50%; border: none; background: var(--p); color: white; font-size: 24px; cursor: pointer; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .controles-stock { display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: auto; padding-top: 8px; border-top: 1px solid var(--br); }
        .btn-qty { background: var(--pc); border: none; width: 25px; height: 25px; border-radius: 50%; color: var(--s); font-weight: bold; cursor: pointer; }

        .pdf-item, .regalo-item { background: var(--b); border: 1px solid var(--br); border-radius: 15px; padding: 15px; display: flex; align-items: center; gap: 15px; margin-bottom: 10px; text-decoration: none; color: var(--txt); transition: 0.2s; }
        .pdf-item:hover { border-color: var(--p); background: var(--pc); }
        .pdf-icon, .regalo-icon { font-size: 24px; color: var(--s); }
        .pdf-info, .regalo-info { flex: 1; }
        .pdf-nombre, .regalo-nombre { font-weight: 600; font-size: 14px; margin: 0; }
        .pdf-fecha, .regalo-meta { font-size: 11px; color: #888; margin: 0; }
        
        .preferencias-box { font-size: 12px; font-style: italic; color: var(--s); margin-top: 5px; padding: 5px; background: var(--pc); border-radius: 8px; }
        .enlace-tag { display: inline-block; padding: 2px 8px; background: var(--p); color: white; border-radius: 10px; font-size: 10px; margin-right: 5px; margin-top: 5px; }

        .editor-rich { background: var(--f); border: 1px solid var(--br); border-radius: 10px; min-height: 200px; padding: 12px; outline: none; margin-top: 5px; color: var(--txt); overflow-y: auto; }
        .editor-rich img { max-width: 100%; border-radius: 10px; margin: 10px 0; }
        .editor-toolbar { display: flex; gap: 5px; margin-bottom: 5px; flex-wrap: wrap; background: var(--pc); padding: 5px; border-radius: 10px; }
        .btn-editor { background: var(--b); border: 1px solid var(--br); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 12px; color: var(--txt); }
        
        .contador-vueltas-mini { display: flex; align-items: center; gap: 10px; background: var(--s); color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<button id="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>

<div class="menu-secciones">
    <button class="btn-nav active" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 INICIO</button>
    <button class="btn-nav" id="nav-STOCK" onclick="cambiarVista('STOCK')">📦 STOCK</button>
    <button class="btn-nav" id="nav-COMPRAS" onclick="cambiarVista('COMPRAS')">🛒 COMPRAS</button>
    <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 PROYECTOS</button>
    <button class="btn-nav" id="nav-PDFS" onclick="cambiarVista('PDFS')">📂 PDFs</button>
    <button class="btn-nav" id="nav-REGALOS" onclick="cambiarVista('REGALOS')">🎁 REGALOS</button>
    <button class="btn-nav" id="nav-NOTAS" onclick="cambiarVista('NOTAS')">📝 NOTAS</button>
    <button class="btn-nav" id="nav-LLAVES" onclick="cambiarVista('LLAVES')">🔑 LLAVES</button>
</div>

<div id="vista-INICIO">
    <div class="card-form">
        <h2 id="titulo-formulario" style="color:var(--s); text-align:center; margin-top:0;">📦 Añadir Material</h2>
        <input type="hidden" id="m-id">
        <label>NOMBRE DEL MATERIAL</label>
        <input type="text" id="m-nombre" placeholder="Ej: Lana Merino Azul">
        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>CATEGORÍA</label>
                <select id="m-categoria">
                    <option value="Lana">🧶 Lana</option>
                    <option value="Telas">👗 Telas</option>
                    <option value="Hilos">🧵 Hilos</option>
                    <option value="Accesorios">🎀 Accesorios</option>
                    <option value="Otros">🧸 Otros</option>
                </select>
            </div>
            <div style="width:80px;">
                <label>CANTIDAD</label>
                <input type="number" id="m-cantidad" value="1">
            </div>
        </div>
        <label>🧵 COMPOSICIÓN</label>
        <input type="text" id="m-composicion" placeholder="Ej: 100% Algodón">
        <label>📍 TIENDA DONDE SE COMPRÓ</label>
        <input type="text" id="m-tienda" placeholder="Ej: Mercería del Barrio">
        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>🪡 GROSOR / WPI</label>
                <input type="text" id="m-grosor" placeholder="Ej: Fingering, 3mm...">
            </div>
            <div style="flex:1;">
                <label>📏 LONGITUD</label>
                <input type="text" id="m-longitud" placeholder="Ej: 120m / 50g">
            </div>
        </div>
        <label>NOTAS ADICIONALES</label>
        <textarea id="m-notas" placeholder="Nº de lote, etc..."></textarea>
        <label>FOTO DEL MATERIAL</label>
        <input type="file" id="m-archivo" accept="image/*">
        <button id="btn-accion-stock" class="btn-grande" onclick="guardarNuevo('stock')">GUARDAR EN STOCK</button>
        <button id="btn-cancelar-edit" class="btn-grande" style="display:none; background:#888" onclick="limpiarFormulario()">CANCELAR EDICIÓN</button>
    </div>
</div>

<div id="vista-STOCK" style="display:none;">
    <div class="filtros-container">
        <button class="btn-filtro active" id="filtro-Todo" onclick="filtrar('Todo')">✨ Todo</button>
        <button class="btn-filtro" id="filtro-Lana" onclick="filtrar('Lana')">🧶 Lana</button>
        <button class="btn-filtro" id="filtro-Telas" onclick="filtrar('Telas')">👗 Telas</button>
        <button class="btn-filtro" id="filtro-Hilos" onclick="filtrar('Hilos')">🧵 Hilos</button>
        <button class="btn-filtro" id="filtro-Accesorios" onclick="filtrar('Accesorios')">🎀 Accesorios</button>
        <button class="btn-filtro" id="filtro-Otros" onclick="filtrar('Otros')">🧸 Otros</button>
    </div>
    <div id="lista-stock" class="grid-estudio"></div>
</div>

<div id="vista-COMPRAS" style="display:none;">
    <div class="card-form">
        <h2 style="color:var(--s); text-align:center; margin-top:0;">🛒 Lista de Compras</h2>
        <input type="text" id="c-nombre" placeholder="¿Qué necesitas comprar?">
        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>TIENDA</label>
                <input type="text" id="c-tienda" placeholder="Ej: Mercería Ana">
            </div>
            <div style="flex:1;">
                <label>PRIORIDAD</label>
                <select id="c-prioridad">
                    <option value="Alta">🔴 Alta</option>
                    <option value="Media">🟡 Media</option>
                    <option value="Baja">🟢 Baja</option>
                </select>
            </div>
        </div>
        <button class="btn-grande" style="background:var(--s)" onclick="guardarCompra()">AÑADIR A LA LISTA</button>
    </div>
    <div class="filtros-container" id="filtros-tiendas-compras"></div>
    <div id="lista-compras"></div>
</div>

<div id="vista-PROYECTOS" style="display:none;">
    <div class="card-form">
        <h2 style="color:var(--s); text-align:center; margin-top:0;">✨ Nuevo Proyecto</h2>
        <label>NOMBRE DEL PROYECTO</label>
        <input type="text" id="p-nombre" placeholder="Ej: Jersey de Invierno">
        <label>ESTADO</label>
        <select id="p-estado">
            <option value="Idea">💡 Idea</option>
            <option value="En proceso">⏳ En proceso</option>
            <option value="Terminado">✅ Terminado</option>
        </select>
        <label>NOTAS DEL PROYECTO</label>
        <textarea id="p-notas" placeholder="Patrón, agujas usadas..."></textarea>
        <label>DIBUJO DEL PUNTO</label>
        <div class="canvas-container"><canvas id="canvas-punto" class="canvas-base canvas-grid"></canvas></div>
        <div class="canvas-tools">
            <button class="btn-tool active" id="tool-pincel-punto" onclick="setTool('canvas-punto', 'pincel')">🖌️ Pincel</button>
            <button class="btn-tool" id="tool-goma-punto" onclick="setTool('canvas-punto', 'goma')">🧽 Goma</button>
            <button class="btn-tool" onclick="limpiarCanvas('canvas-punto')">🗑️</button>
        </div>
        <label>DISEÑO SOBRE CUERPOS (PLANTILLA TÉCNICA)</label>
        <div class="canvas-container"><canvas id="canvas-cuerpos" class="canvas-base canvas-cuerpos canvas-largo"></canvas></div>
        <div class="canvas-tools">
            <button class="btn-tool active" id="tool-pincel-cuerpos" onclick="setTool('canvas-cuerpos', 'pincel')">🖌️ Pincel</button>
            <button class="btn-tool" id="tool-goma-cuerpos" onclick="setTool('canvas-cuerpos', 'goma')">🧽 Goma</button>
            <button class="btn-tool" onclick="limpiarCanvas('canvas-cuerpos')">🗑️</button>
        </div>
        <label>FOTO FINAL</label>
        <input type="file" id="p-archivo" accept="image/*">
        <button class="btn-grande" style="background:var(--p)" onclick="guardarNuevo('proyecto')">CREAR PROYECTO</button>
    </div>
    <div id="lista-proyectos" class="grid-estudio"></div>
</div>

<div id="vista-PDFS" style="display:none;">
    <div class="card-form" style="border: 2px solid var(--p);">
        <h2 style="color:var(--s); text-align:center; margin-top:0;">📝 Diseñador de Patrones</h2>
        
        <div class="contador-vueltas-mini">
            <span>🔢 Vuelta: <span id="vueltas-editor">0</span></span>
            <button onclick="cambiarVueltaEditor(-1)" style="border:none; background:white; border-radius:50%; width:20px; height:20px; cursor:pointer;">-</button>
            <button onclick="cambiarVueltaEditor(1)" style="border:none; background:white; border-radius:50%; width:20px; height:20px; cursor:pointer;">+</button>
        </div>

        <label>TÍTULO DEL PATRÓN</label>
        <input type="text" id="borrador-titulo" placeholder="Ej: Mi primera manta">
        
        <label>HERRAMIENTAS</label>
        <div class="editor-toolbar">
            <button class="btn-editor" onclick="document.execCommand('bold', false, null)"><b>B</b></button>
            <button class="btn-editor" onclick="document.execCommand('italic', false, null)"><i>I</i></button>
            <button class="btn-editor" onclick="document.execCommand('insertUnorderedList', false, null)">• Lista</button>
            
            <button class="btn-editor" onclick="document.getElementById('input-foto-editor').click()">🖼️ Subir Foto</button>
            <input type="file" id="input-foto-editor" accept="image/*" style="display:none" onchange="insertarFotoEnEditor(this)">
        </div>
        
        <div id="borrador-contenido" class="editor-rich" contenteditable="true"></div>
        
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
            <button class="btn-grande" style="background:#888; font-size:12px; margin-top:0;" onclick="guardarBorradorLocal()">💾 GUARDAR</button>
            <button class="btn-grande" style="background:var(--p); font-size:12px; margin-top:0;" onclick="generarPDF()">📥 PDF</button>
        </div>
        <button class="btn-grande" style="background:#e74c3c; font-size:12px; margin-top:10px;" onclick="eliminarBorradorTotal()">🗑️ ELIMINAR TODO EL BORRADOR</button>
    </div>

    <div class="card-form">
        <h2 style="color:var(--s); text-align:center; margin-top:0;">📂 Biblioteca de PDFs</h2>
        <label>SUBIR ARCHIVO EXISTENTE</label>
        <input type="text" id="pdf-nombre" placeholder="Nombre del patrón">
        <input type="file" id="pdf-archivo" accept=".pdf" style="margin-top:10px;">
        <button class="btn-grande" style="background:var(--s)" onclick="subirPDF()">SUBIR PDF</button>
    </div>
    <div id="lista-pdfs"></div>
</div>

<div id="vista-REGALOS" style="display:none;">
    <div class="card-form">
        <h2 id="titulo-regalo" style="color:var(--s); text-align:center; margin-top:0;">🎁 Regalos y Encargos</h2>
        <label>¿PARA QUIÉN ES?</label>
        <input type="text" id="reg-persona" placeholder="Nombre de la persona">
        <label>¿QUÉ VAS A REGALAR/HACER?</label>
        <input type="text" id="reg-detalle" placeholder="Ej: Manta de apego">
        <label>GUSTOS Y PREFERENCIAS</label>
        <textarea id="reg-preferencias" placeholder="Le gustan los colores pastel..."></textarea>
        <label>ENLAZAR DISEÑO (PROYECTO)</label>
        <select id="reg-enlace-proyecto"><option value="">Ninguno</option></select>
        <label>ENLAZAR PATRÓN PDF</label>
        <select id="reg-enlace-pdf"><option value="">Ninguno</option></select>
        <button class="btn-grande" style="background:var(--p)" onclick="guardarRegalo()">AÑADIR AL MAPA</button>
    </div>
    <h3 style="color:var(--s); padding-left:10px;">📍 Mapa de Regalos Pendientes</h3>
    <div id="lista-regalos-pendientes"></div>
    <h3 style="color:var(--txt); padding-left:10px; margin-top:30px; opacity:0.6;">✅ Entregados (Historial)</h3>
    <div id="lista-regalos-entregados" style="opacity:0.6;"></div>
</div>

<div id="vista-NOTAS" style="display:none;">
    <div class="card-form">
        <h2 style="color:var(--s); text-align:center; margin-top:0;">📝 Notas y Recordatorios</h2>
        <label>TÍTULO</label>
        <input type="text" id="n-titulo" placeholder="Ej: Ideas para colcha">
        <label>CONTENIDO</label>
        <textarea id="n-contenido" style="height:120px;" placeholder="Escribe aquí tus ideas..."></textarea>
        <button class="btn-grande" style="background:var(--s)" onclick="guardarNota()">GUARDAR NOTA</button>
    </div>
    <div id="lista-notas"></div>
</div>
<div id="vista-LLAVES" class="view" style="display:none;">
    <h2 style="color:var(--s); text-align:center;">🔑 Mis Llaves</h2>
    
    <div style="background:var(--b); padding:15px; border-radius:20px; border:1px solid var(--br); margin-bottom:20px;">
        <input type="text" id="llave-nombre" placeholder="Sitio (Ej: Netflix)" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid var(--br); box-sizing:border-box;">
        <input type="text" id="llave-usuario" placeholder="Usuario / Email" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid var(--br); box-sizing:border-box;">
        <input type="text" id="llave-pass" placeholder="Contraseña" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px; border:1px solid var(--br); box-sizing:border-box;">
        <button onclick="guardarNuevaLlave()" style="width:100%; background:var(--p); color:white; border:none; padding:12px; border-radius:10px; font-weight:bold; cursor:pointer;">
            ✨ Guardar Nueva Llave
        </button>
    </div>

    <div id="lista-llaves"></div>
</div>
<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let lanasGlobal = [];
    let proyectosGlobal = [];
    let pdfsGlobal = [];
    let regalosGlobal = [];
    let comprasGlobal = [];
    let tiendaFiltradaCompras = 'Todas';
    let toolsState = { 'canvas-punto': 'pincel', 'canvas-cuerpos': 'pincel' };
    let vueltasContador = 0;

   function cambiarVista(v) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        const navBtn = document.getElementById('nav-' + v);

    async function guardarNuevo(tipo) {
        const idEdit = document.getElementById('m-id').value;
        const fileInput = document.getElementById(tipo === 'stock' ? 'm-archivo' : 'p-archivo');
        let fotoUrl = "";

        try {
            if(fileInput && fileInput.files[0]) {
                const f = fileInput.files[0];
                const name = `${Date.now()}_${f.name}`;
                const { error: uploadError } = await client.storage.from('fotos-lanas').upload(name, f);
                if (uploadError) throw new Error("Error al subir foto: " + uploadError.message);
                else fotoUrl = client.storage.from('fotos-lanas').getPublicUrl(name).data.publicUrl;
            }

            if(tipo === 'stock') {
                const nombreVal = document.getElementById('m-nombre').value;
                if(!nombreVal) throw new Error("Debes poner un nombre al material");
                const datos = { 
                    tipo_material: nombreVal, 
                    categoria: document.getElementById('m-categoria').value, 
                    cantidad: parseInt(document.getElementById('m-cantidad').value) || 0,
                    composicion: document.getElementById('m-composicion').value || "",
                    tienda: document.getElementById('m-tienda').value || "",
                    grosor: document.getElementById('m-grosor').value || "",
                    longitud: document.getElementById('m-longitud').value || "",
                    notas: document.getElementById('m-notas').value || ""
                };
                if(fotoUrl) datos.contenido = fotoUrl;
                if(idEdit) { await client.from('estudio_data').update(datos).eq('id', idEdit); } 
                else { await client.from('estudio_data').insert([datos]); }
                limpiarFormulario();
            } else {
                await client.from('proyectos_data').insert([{
                    nombre: document.getElementById('p-nombre').value,
                    estado: document.getElementById('p-estado').value,
                    notas: document.getElementById('p-notas').value,
                    foto: fotoUrl || null
                }]);
            }
            alert("¡Guardado correctamente! 💖");
            await cargarDatos();
            cambiarVista(tipo === 'stock' ? 'STOCK' : 'PROYECTOS');
        } catch (err) { alert("Error al guardar: " + err.message); }
    }

    function iniciarCanvas(id) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext('2d');
        let drawing = false;
        const getPos = e => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        };
        const start = e => { drawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); e.preventDefault(); };
        const end = () => drawing = false;
        const draw = e => {
            if (!drawing) return;
            const pos = getPos(e);
            if (toolsState[id] === 'goma') { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 20; } 
            else { ctx.globalCompositeOperation = 'source-over'; ctx.lineWidth = 3; ctx.strokeStyle = '#f06292'; }
            ctx.lineCap = 'round'; ctx.lineTo(pos.x, pos.y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); e.preventDefault();
        };
        canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
        canvas.addEventListener('mousedown', start); canvas.addEventListener('touchstart', start);
        canvas.addEventListener('mouseup', end); canvas.addEventListener('touchend', end);
        canvas.addEventListener('mousemove', draw); canvas.addEventListener('touchmove', draw);
    }

    async function generarPDF() {
        const titulo = document.getElementById('borrador-titulo').value || 'Sin titulo';
        const contenido = document.getElementById('borrador-contenido').innerHTML;
        if(!contenido) return alert("¡Escribe algo primero! 🧶");

        const temp = document.createElement('div');
        temp.innerHTML = `<div style="padding:40px; font-family:serif; color:#444;"><h1 style="color:#f06292; text-align:center; border-bottom:2px solid #fce4ec; padding-bottom:10px;">${titulo}</h1><div style="margin-top:20px; line-height:1.6;">${contenido}</div></div>`;
        
        const opt = { 
            margin: 10, 
            filename: `${titulo}.pdf`, 
            image: { type: 'jpeg', quality: 0.98 }, 
            html2canvas: { scale: 2 }, 
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
        };

        try {
            const pdfBlob = await html2pdf().set(opt).from(temp).output('blob');
            const link = document.createElement('a');
            link.href = URL.createObjectURL(pdfBlob); 
            link.download = `${titulo}.pdf`; 
            link.click();

            const fileName = `${Date.now()}_${titulo.replace(/\s+/g, '_')}.pdf`;
            await client.storage.from('patrones_pdf').upload(fileName, pdfBlob, { contentType: 'application/pdf' });
            const { data: urlData } = client.storage.from('patrones_pdf').getPublicUrl(fileName);
            await client.from('pdfs_data').insert([{ nombre: titulo, url: urlData.publicUrl }]);

            alert("¡PDF generado y guardado en tu biblioteca! 💖✨");
            cargarPDFs();
        } catch (error) { 
            console.error(error); 
            alert("Hubo un error al procesar el PDF."); 
        }
    }

                <div style="flex-grow: 1;">
                    <strong style="display:block; color:var(--s); font-size: 16px;">${l.nombre}</strong>
                    <span style="display:block; font-size: 13px; color: var(--txt); opacity: 0.8; margin-bottom: 5px;">👤 ${l.usuario || 'Sin usuario'}</span>
                    <code style="background: var(--pc); padding: 2px 6px; border-radius: 5px; font-size: 14px;">${l.clave}</code>
                </div>
                <button onclick="navigator.clipboard.writeText('${l.clave}'); alert('¡Copiado! 📋')" 
                        style="background: var(--p); border: none; padding: 10px; border-radius: 50%; cursor: pointer; color: white; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;">
                    📋
                </button>
            </div>
        `).join('');
    }
    async function eliminarNota(id) { if(confirm("¿Borrar nota?")) { await client.from('notas_data').delete().eq('id', id); cargarNotas(); } }
async function guardarNuevaLlave() {
        const nombre = document.getElementById('llave-nombre').value;
        const usuario = document.getElementById('llave-usuario').value;
        const clave = document.getElementById('llave-pass').value;

        if (!nombre || !clave) {
            alert("Por favor, rellena al menos el nombre y la contraseña");
            return;
        }

        const { error } = await client
            .from('llaves_data')
            .insert([{ nombre, usuario, clave }]);

        if (error) {
            alert("Error al guardar: " + error.message);
        } else {
            document.getElementById('llave-nombre').value = '';
            document.getElementById('llave-usuario').value = '';
            document.getElementById('llave-pass').value = '';
            cargarLlaves(); 
        }
    }
    // ONLOAD ACTUALIZADO PARA RECUPERAR TEMA
    window.onload = function() {
        const temaGuardado = localStorage.getItem('tema-preferido');
        if (temaGuardado === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            const toggleBtn = document.getElementById('dark-mode-toggle');
            if(toggleBtn) toggleBtn.innerText = '☀️';
        }
        cargarDatos();
    };
</script>

</body>
</html>
