<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --t: #4a4a4a; --br: #f1e1e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--t); margin: 0; padding: 20px; }
        
        /* Navegación */
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 20px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 20px; }
        .btn-nav { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 15px; font-size: 11px; text-transform: uppercase; }
        .btn-nav.active { background: var(--pc); color: var(--s); border-bottom: 3px solid var(--s); }

        /* Filtros */
        .filtros-materiales { display: flex; gap: 10px; overflow-x: auto; padding: 10px; margin-bottom: 10px; }
        .btn-filtro { padding: 8px 16px; border-radius: 25px; border: 1px solid var(--br); background: var(--b); white-space: nowrap; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-filtro.active { background: var(--s); color: white; border-color: var(--s); }

        /* Stock Cards */
        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .item-card { background: var(--b); padding: 15px; border-radius: 20px; border: 1px solid var(--br); text-align: center; position: relative; }
        .item-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        .controles-stock { display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-qty { width: 30px; height: 30px; border-radius: 8px; border: none; background: var(--pc); color: var(--s); font-weight: bold; cursor: pointer; }
        
        .btn-editar { position: absolute; top: 5px; left: 5px; background: #FFC107; border: none; border-radius: 50%; width: 24px; height: 24px; color: white; cursor: pointer; }
        .btn-eliminar { position: absolute; top: 5px; right: 5px; background: #ff5252; border: none; border-radius: 50%; width: 24px; height: 24px; color: white; cursor: pointer; }

        /* Formulario */
        .card-form { background: var(--b); padding: 20px; border-radius: 25px; border: 1px solid var(--br); max-width: 400px; margin: auto; }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--br); border-radius: 10px; box-sizing: border-box; }
        .btn-p { background: var(--p); color: white; padding: 14px; border: none; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="menu-secciones">
        <button class="btn-nav active" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 Inicio</button>
        <button class="btn-nav" id="nav-MATERIALES" onclick="cambiarVista('MATERIALES')">📦 Materiales</button>
        <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 Proyectos</button>
    </div>

    <div id="contenedor-filtros" class="filtros-materiales" style="display:none;"></div>

    <div id="seccion-registro" class="card-form">
        <h3 id="titulo-form" style="color:var(--s); margin-top:0;">✨ Nuevo Material</h3>
        <input type="text" id="m-nombre" placeholder="¿Qué es?">
        <select id="m-categoria"></select>
        <input type="number" id="m-cantidad" value="1">
        <input type="file" id="m-foto" accept="image/*">
        <button id="btn-save" class="btn-p" onclick="guardar()">AÑADIR</button>
    </div>

    <div id="seccion-listado" style="display:none;">
        <div id="lista-stock" class="grid-estudio"></div>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let stock = [];
    let categorias = [];
    let editID = null;

    // Emojis (Llaves exactas)
    const emojis = { "Lana": "🧶", "Telas": "👗", "Hilos": "🧵", "Accesorios": "🎀", "Otros": "🧸" };

    async function iniciar() {
        const { data: catData } = await client.from('Secciones').select('nombre');
        categorias = catData ? catData.map(c => c.nombre.trim()) : [];
        
        const sel = document.getElementById('m-categoria');
        sel.innerHTML = categorias.map(c => `<option value="${c}">${emojis[c] || '🌸'} ${c}</option>`).join('');

        await cargar();
        renderFiltros();
    }

    async function cargar() {
        const { data } = await client.from('estudio_data').select('*').order('created_at', { ascending: false });
        stock = data || [];
        renderStock(stock);
    }

    function renderStock(lista) {
        const cont = document.getElementById('lista-stock');
        cont.innerHTML = lista.map(m => `
            <div class="item-card">
                <button class="btn-editar" onclick="preEdicion(${m.id})">✏️</button>
                <button class="btn-eliminar" onclick="borrar(${m.id})">×</button>
                <img src="${m.contenido || 'https://via.placeholder.com/150'}">
                <div style="font-weight:bold; margin-bottom:8px;">${m.tipo_material}</div>
                <div class="controles-stock">
                    <button class="btn-qty" onclick="cambiarCant(${m.id}, -1)">-</button>
                    <span>${m.cantidad || 0}</span>
                    <button class="btn-qty" onclick="cambiarCant(${m.id}, 1)">+</button>
                </div>
            </div>
        `).join('');
    }

    function renderFiltros() {
        const cont = document.getElementById('contenedor-filtros');
        let html = `<button class="btn-filtro active" onclick="filtrar('TODO', this)">✨ Todo</button>`;
        categorias.forEach(c => {
            html += `<button class="btn-filtro" onclick="filtrar('${c}', this)">${emojis[c] || '🌸'} ${c}</button>`;
        });
        cont.innerHTML = html;
    }

    function filtrar(cat, btn) {
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderStock(cat === 'TODO' ? stock : stock.filter(s => s.categoria === cat));
    }

    function cambiarVista(v) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-'+v).classList.add('active');
        document.getElementById('seccion-registro').style.display = (v === 'INICIO' ? 'block' : 'none');
        document.getElementById('seccion-listado').style.display = (v === 'MATERIALES' ? 'block' : 'none');
        document.getElementById('contenedor-filtros').style.display = (v === 'MATERIALES' ? 'flex' : 'none');
        if(v === 'MATERIALES') cargar();
    }

    async function cambiarCant(id, n) {
        const m = stock.find(x => x.id === id);
        const nc = Math.max(0, (m.cantidad || 0) + n);
        await client.from('estudio_data').update({ cantidad: nc }).eq('id', id);
        cargar();
    }

    async function guardar() {
        const nom = document.getElementById('m-nombre').value;
        const cat = document.getElementById('m-categoria').value;
        const can = document.getElementById('m-cantidad').value;
        const file = document.getElementById('m-foto').files[0];

        if(!nom) return alert("Pon un nombre");

        let url = null;
        if(file) {
            const path = `f_${Date.now()}`;
            await client.storage.from('media').upload(path, file);
            url = client.storage.from('media').getPublicUrl(path).data.publicUrl;
        }

        const obj = { tipo_material: nom, categoria: cat, cantidad: parseInt(can) };
        if(url) obj.contenido = url;

        if(editID) await client.from('estudio_data').update(obj).eq('id', editID);
        else await client.from('estudio_data').insert([obj]);

        location.reload();
    }

    function preEdicion(id) {
        const m = stock.find(x => x.id === id);
        editID = id;
        cambiarVista('INICIO');
        document.getElementById('m-nombre').value = m.tipo_material;
        document.getElementById('m-categoria').value = m.categoria;
        document.getElementById('m-cantidad').value = m.cantidad;
        document.getElementById('titulo-form').innerText = "✏️ Editar";
    }

    async function borrar(id) {
        if(confirm("¿Borrar?")) {
            await client.from('estudio_data').delete().eq('id', id);
            cargar();
        }
    }

    iniciar();
</script>
</body>
</html>
