<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { 
            --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --br: #f1e1e5; --txt: #444; 
        }
        [data-theme="dark"] {
            --p: #ff85a2; --pc: #4a2b34; --s: #f06292; --f: #121212; --b: #1e1e1e; --br: #333333; --txt: #fce4ec;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--txt); margin: 0; padding: 15px; padding-bottom: 80px; transition: 0.3s; }
        
        /* Menú superior */
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 50px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); overflow-x: auto; scrollbar-width: none; }
        .btn-nav { flex: 1; padding: 10px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 40px; font-size: 10px; text-transform: uppercase; white-space: nowrap; }
        .btn-nav.active { background: var(--pc); color: var(--s); border: 1px solid var(--p); }

        /* Estilo general tarjetas y formularios */
        .card-form { background: var(--b); padding: 20px; border-radius: 25px; border: 1px solid var(--br); max-width: 500px; margin: 0 auto 20px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        label { display: block; font-size: 11px; color: var(--s); font-weight: 700; margin: 10px 0 4px 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--br); box-sizing: border-box; font-size: 14px; background: var(--f); color: var(--txt); transition: 0.3s; }
        input:focus { border-color: var(--p); outline: none; box-shadow: 0 0 0 3px var(--pc); }
        .btn-grande { width: 100%; background: var(--p); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; transition: 0.3s; box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3); }
        .btn-grande:active { transform: scale(0.98); }

        /* Grid de materiales en Stock */
        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(145px, 1fr)); gap: 12px; }
        .item-card { background: var(--b); border-radius: 18px; border: 1px solid var(--br); overflow: hidden; position: relative; display: flex; flex-direction: column; min-height: 310px; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.02); }
        .foto-material { width: 100%; height: 115px; object-fit: cover; background: #eee; border-bottom: 1px solid var(--br); }
        .info-material { padding: 12px; flex-grow: 1; display: flex; flex-direction: column; gap: 4px; color: var(--txt); }
        .info-titulo { font-size: 13px; font-weight: 700; color: var(--s); line-height: 1.2; margin: 0 0 4px 0; min-height: 32px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .info-detalle { font-size: 10px; opacity: 0.7; }
        .info-cantidad { font-size: 12px; font-weight: 800; color: var(--p); margin-top: auto; padding-top: 8px; border-top: 1px dashed var(--br); display: flex; justify-content: space-between; }
        
        .btn-eliminar { position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.8); border: none; width: 24px; height: 24px; border-radius: 50%; color: #ff5252; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }

        #dark-mode-toggle { position: fixed; bottom: 20px; right: 20px; width: 55px; height: 55px; border-radius: 50%; border: none; background: var(--p); color: white; font-size: 24px; cursor: pointer; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<button id="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>

<div class="menu-secciones">
    <button class="btn-nav active" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 INICIO</button>
    <button class="btn-nav" id="nav-STOCK" onclick="cambiarVista('STOCK')">📦 STOCK</button>
    <button class="btn-nav" id="nav-CAPRICHOS" onclick="cambiarVista('CAPRICHOS')">✨ CAPRICHOS</button>
    <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 PROYECTOS</button>
    <button class="btn-nav" id="nav-PDFS" onclick="cambiarVista('PDFS')">📂 PDFs</button>
    <button class="btn-nav" id="nav-NOTAS" onclick="cambiarVista('NOTAS')">📝 NOTAS</button>
</div>

<div id="vista-INICIO">
    <div class="card-form">
        <h2 id="titulo-formulario" style="color:var(--s); text-align:center; margin-top:0; font-size:20px;">📦 Añadir Material</h2>
        <input type="hidden" id="m-id">
        <label>NOMBRE DEL MATERIAL</label>
        <input type="text" id="m-nombre" placeholder="Ej: Lana Merino Azul">
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1;">
                <label>CATEGORÍA</label>
                <select id="m-categoria">
                    <option value="Lana">🧶 Lana</option>
                    <option value="Telas">👗 Telas</option>
                    <option value="Hilos">🧵 Hilos</option>
                    <option value="Accesorios">🎀 Accesorios</option>
                    <option value="Otros">🧸 Otros</option>
                </select>
            </div>
            <div style="width:80px;">
                <label>CANTIDAD</label>
                <input type="number" id="m-cantidad" value="1">
            </div>
        </div>

        <label>🧵 COMPOSICIÓN</label>
        <input type="text" id="m-composicion" placeholder="Ej: 100% Algodón">
        <label>📍 TIENDA</label>
        <input type="text" id="m-tienda" placeholder="Ej: Mercería del Barrio">
        <label>📸 FOTO DEL MATERIAL</label>
        <input type="file" id="m-archivo" accept="image/*">
        
        <button id="btn-accion-stock" class="btn-grande" onclick="guardarNuevo('stock')">GUARDAR EN STOCK</button>
    </div>
</div>

<div id="vista-STOCK" style="display:none;">
    <div id="lista-stock" class="grid-estudio"></div>
</div>

<div id="vista-CAPRICHOS" style="display:none;">
    <div class="card-form">
        <h2 style="color:var(--s); text-align:center; margin-top:0; font-size:20px;">✨ Mis Caprichos</h2>
        </div>
</div>

<div id="vista-PROYECTOS" style="display:none;">
    <div class="card-form">
        <h2 style="color:var(--s); text-align:center; margin-top:0; font-size:20px;">✨ Nuevo Proyecto</h2>
        <label>NOMBRE DEL PROYECTO</label>
        <input type="text" id="p-nombre" placeholder="Ej: Jersey de invierno">
        <label>ESTADO</label>
        <select id="p-estado">
            <option value="Idea">💡 Idea</option>
            <option value="En proceso">⏳ En proceso</option>
            <option value="Terminado">✅ Terminado</option>
        </select>
        <label>NOTAS DEL PROYECTO</label>
        <textarea id="p-notas" placeholder="Detalles, agujas usadas..."></textarea>
        <label>📸 FOTO DEL PROYECTO</label>
        <input type="file" id="p-archivo" accept="image/*">
        <button class="btn-grande" onclick="guardarNuevo('proyecto')">CREAR PROYECTO</button>
    </div>
    <div id="lista-proyectos" class="grid-estudio"></div>
</div>

<div id="vista-PDFS" style="display:none;">
    <div class="card-form">
        <h2 style="color:var(--s); text-align:center; margin-top:0; font-size:20px;">📂 Subir Patrón (PDF)</h2>
        <label>NOMBRE DEL PATRÓN</label>
        <input type="text" id="pdf-nombre" placeholder="Ej: Patrón Chaleco">
        <label>ARCHIVO PDF</label>
        <input type="file" id="pdf-archivo" accept="application/pdf">
        <button class="btn-grande" onclick="subirPDF()">SUBIR PDF</button>
    </div>
    <div id="lista-pdfs" class="grid-estudio"></div>
</div>

<div id="vista-NOTAS" style="display:none;">
    <div class="card-form">
        <h2 style="color:var(--s); text-align:center; margin-top:0; font-size:20px;">📝 Nueva Nota</h2>
        <label>TÍTULO</label>
        <input type="text" id="n-titulo">
        <label>CONTENIDO</label>
        <textarea id="n-contenido" style="height: 150px;"></textarea>
        <button class="btn-grande" onclick="guardarNota()">GUARDAR NOTA</button>
    </div>
    <div id="lista-notas" style="display: grid; gap: 15px;"></div>
</div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    function cambiarVista(v) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + v).classList.add('active');
        ['INICIO', 'STOCK', 'CAPRICHOS', 'PROYECTOS', 'PDFS', 'NOTAS'].forEach(id => {
            const el = document.getElementById('vista-' + id);
            if(el) el.style.display = (id === v ? 'block' : 'none');
        });
        if(v === 'STOCK') cargarDatos();
        if(v === 'PROYECTOS') cargarProyectos();
        if(v === 'PDFS') cargarPDFs();
        if(v === 'NOTAS') cargarNotas();
    }

    async function guardarNuevo(tipo) {
        const btn = tipo === 'stock' ? document.getElementById('btn-accion-stock') : event.target;
        btn.innerText = "Subiendo..."; btn.disabled = true;

        const fileInput = document.getElementById(tipo === 'stock' ? 'm-archivo' : 'p-archivo');
        let fotoUrl = "";

        if (fileInput.files[0]) {
            const f = fileInput.files[0];
            const name = `${Date.now()}_${f.name}`;
            const { data, error } = await client.storage.from('fotos-lanas').upload(name, f);
            if(data) fotoUrl = client.storage.from('fotos-lanas').getPublicUrl(name).data.publicUrl;
        }

        if (tipo === 'stock') {
            const { error } = await client.from('estudio_data').insert([{
                tipo_material: document.getElementById('m-nombre').value,
                categoria: document.getElementById('m-categoria').value,
                cantidad: parseInt(document.getElementById('m-cantidad').value),
                composicion: document.getElementById('m-composicion').value,
                tienda: document.getElementById('m-tienda').value,
                contenido: fotoUrl
            }]);
            if(!error) { alert("¡Material guardado! 🧶"); location.reload(); }
        } else {
            const { error } = await client.from('Proyectos').insert([{
                nombre: document.getElementById('p-nombre').value,
                estado: document.getElementById('p-estado').value,
                notas: document.getElementById('p-notas').value,
                foto: fotoUrl
            }]);
            if(!error) { alert("¡Proyecto creado! ✨"); cambiarVista('PROYECTOS'); }
        }
        btn.innerText = (tipo === 'stock' ? "GUARDAR EN STOCK" : "CREAR PROYECTO"); btn.disabled = false;
    }

    async function cargarDatos() {
        const { data, error } = await client.from('estudio_data').select('*').order('created_at', {ascending: false});
        if (data) {
            document.getElementById('lista-stock').innerHTML = data.map(m => `
                <div class="item-card">
                    <button class="btn-eliminar" onclick="eliminarItem(${m.id}, 'estudio_data')">✕</button>
                    <img src="${m.contenido || 'https://via.placeholder.com/150'}" class="foto-material" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="info-material">
                        <span class="info-titulo">${m.tipo_material}</span>
                        <span class="info-detalle"><b>📦 Categoría:</b> ${m.categoria}</span>
                        <span class="info-detalle"><b>🧵 Comp:</b> ${m.composicion || 'N/A'}</span>
                        <span class="info-detalle"><b>📍 Tienda:</b> ${m.tienda || 'N/A'}</span>
                        <div class="info-cantidad">
                            <span>Disponible:</span>
                            <span>${m.cantidad}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    }

    async function eliminarItem(id, tabla) {
        if (confirm("¿Estás segura de eliminar este item? 🎀")) {
            const { error } = await client.from(tabla).delete().eq('id', id);
            if (!error) {
                if(tabla === 'estudio_data') cargarDatos();
                else if(tabla === 'Proyectos') cargarProyectos();
                else if(tabla === 'pdfs_data') cargarPDFs();
            }
        }
    }

    async function cargarProyectos() {
        const { data } = await client.from('Proyectos').select('*').order('created_at', {ascending: false});
        if (data) {
            document.getElementById('lista-proyectos').innerHTML = data.map(p => `
                <div class="item-card">
                    <button class="btn-eliminar" onclick="eliminarItem(${p.id}, 'Proyectos')">✕</button>
                    <img src="${p.foto || 'https://via.placeholder.com/150'}" class="foto-material" onerror="this.src='https://via.placeholder.com/150'">
                    <div class="info-material">
                        <span class="info-titulo">${p.nombre}</span>
                        <span class="info-detalle"><b>Estado:</b> ${p.estado}</span>
                        <p style="font-size:10px; margin:5px 0; opacity:0.8;">${p.notas || ''}</p>
                    </div>
                </div>
            `).join('');
        }
    }

    async function subirPDF() {
        const input = document.getElementById('pdf-archivo');
        const nombre = document.getElementById('pdf-nombre').value;
        if (!input.files[0] || !nombre) return alert("Rellena el nombre y selecciona un PDF 🎀");
        
        const f = input.files[0];
        const fileName = `${Date.now()}_${f.name}`;
        const { data, error } = await client.storage.from('pdfs-patrones').upload(fileName, f);
        
        if (data) {
            const { data: urlData } = client.storage.from('pdfs-patrones').getPublicUrl(fileName);
            await client.from('pdfs_data').insert([{ nombre: nombre, url: urlData.publicUrl }]);
            alert("¡PDF subido! 📂");
            document.getElementById('pdf-nombre').value = ""; input.value = "";
            cargarPDFs();
        }
    }

    async function cargarPDFs() {
        const { data } = await client.from('pdfs_data').select('*').order('created_at', {ascending: false});
        if (data) {
            document.getElementById('lista-pdfs').innerHTML = data.map(p => `
                <div class="item-card" style="min-height:120px; padding:15px; justify-content:center; align-items:center; text-align:center;">
                    <button class="btn-eliminar" onclick="eliminarItem(${p.id}, 'pdfs_data')">✕</button>
                    <span style="font-weight:bold; color:var(--s); font-size:14px; margin-bottom:10px;">${p.nombre}</span>
                    <a href="${p.url}" target="_blank" style="text-decoration:none; background:var(--p); color:white; padding:8px 15px; border-radius:10px; font-size:12px; font-weight:bold;">Abrir Patrón</a>
                </div>
            `).join('');
        }
    }

    async function cargarNotas() {
        const { data } = await client.from('notas_data').select('*').order('created_at', {ascending: false});
        if (data) {
            document.getElementById('lista-notas').innerHTML = data.map(n => `
                <div class="card-form" style="margin:0; width:auto; max-width:none; position:relative;">
                    <button class="btn-eliminar" onclick="eliminarNota(${n.id})">✕</button>
                    <h3 style="color:var(--s); margin:0 0 10px 0; font-size:16px;">${n.titulo}</h3>
                    <p style="white-space:pre-wrap; font-size:13px; margin:0; line-height:1.5;">${n.contenido}</p>
                    <small style="display:block; margin-top:10px; opacity:0.5; font-size:10px;">${new Date(n.created_at).toLocaleString()}</small>
                </div>
            `).join('');
        }
    }

    async function guardarNota() {
        const titulo = document.getElementById('n-titulo').value;
        const contenido = document.getElementById('n-contenido').value;
        if(!titulo || !contenido) return alert("Escribe un título y el contenido de tu nota 🎀");
        await client.from('notas_data').insert([{ titulo, contenido }]);
        document.getElementById('n-titulo').value = ""; 
        document.getElementById('n-contenido').value = "";
        cargarNotas();
    }

    async function eliminarNota(id) { if(confirm("¿Borrar nota?")) { await client.from('notas_data').delete().eq('id', id); cargarNotas(); } }

    function toggleDarkMode() {
        const tema = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', tema);
        localStorage.setItem('tema-preferido', tema);
    }

    window.onload = function() {
        const temaGuardado = localStorage.getItem('tema-preferido');
        if (temaGuardado === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
        cargarDatos();
    }
</script>
</body>
</html>
