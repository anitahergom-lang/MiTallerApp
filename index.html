<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa v2.1</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --t: #4a4a4a; --br: #f1e1e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--t); margin: 0; padding: 15px; padding-bottom: 80px; }
        
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 20px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-nav { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 15px; font-size: 10px; text-transform: uppercase; }
        .btn-nav.active { background: var(--pc); color: var(--s); border-bottom: 3px solid var(--s); }

        .card-registro { background: var(--b); padding: 20px; border-radius: 25px; border: 1px solid var(--br); max-width: 600px; margin: auto; margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--br); border-radius: 12px; font-size: 14px; box-sizing: border-box; background: #fff; }
        
        .label-f { font-size: 11px; font-weight: bold; color: var(--s); margin-left: 5px; text-transform: uppercase; display: block; margin-bottom: 4px; }

        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .item-card { background: var(--b); border-radius: 20px; border: 1px solid var(--br); overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
        .foto-material { width: 100%; height: 140px; object-fit: cover; background: #fff0f3; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .info-material { padding: 12px; flex-grow: 1; }
        .info-material h4 { margin: 0; color: var(--s); font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .info-material p { margin: 3px 0; font-size: 11px; color: #777; line-height: 1.2; }
        
        .badge-cantidad { background: var(--pc); color: var(--s); padding: 4px 8px; border-radius: 10px; font-weight: bold; font-size: 11px; display: inline-block; margin-top: 5px; }

        .btn-principal { background: var(--p); color: white; padding: 16px; border: none; border-radius: 18px; width: 100%; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .btn-principal:active { transform: scale(0.98); }
        
        .btn-edit { background: #f0f0f0; color: #666; margin-top: 10px; width: 100%; padding: 8px; border-radius: 10px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; }
        
        /* Indicador de edición */
        #modo-edicion { display: none; background: #fff3cd; color: #856404; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-size: 12px; text-align: center; border: 1px solid #ffeeba; }
    </style>
</head>
<body>

    <div class="menu-secciones">
        <button class="btn-nav active" id="nav-INICIO" onclick="cambiarVista('INICIO')">✨ Registro</button>
        <button class="btn-nav" id="nav-MATERIALES" onclick="cambiarVista('MATERIALES')">🧶 Mi Stock</button>
        <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 Ideas</button>
    </div>

    <div id="seccion-inicio" class="card-registro">
        <div id="modo-edicion">✍️ Estás editando un material existente</div>
        <h3 id="titulo-form" style="text-align:center; color:var(--s); margin-top:0;">🧶 Nueva Lana</h3>
        
        <input type="hidden" id="m-id"> <!-- ID oculto para saber qué editamos -->
        
        <label class="label-f">Nombre del producto</label>
        <input type="text" id="m-nombre" placeholder="Nombre...">
        
        <div class="grid-inputs">
            <div>
                <label class="label-f">Categoría</label>
                <select id="m-categoria"></select>
            </div>
            <div>
                <label class="label-f">Cantidad</label>
                <input type="number" id="m-cantidad" value="1">
            </div>
            <div>
                <label class="label-f">Composición</label>
                <input type="text" id="m-composicion" placeholder="Lana, Algodón...">
            </div>
            <div>
                <label class="label-f">Grosor</label>
                <input type="text" id="m-grosor" placeholder="Fingering, DK...">
            </div>
        </div>

        <label class="label-f">Tienda</label>
        <input type="text" id="m-tienda" placeholder="URL o nombre tienda">

        <label class="label-f">URL Foto (Opcional)</label>
        <input type="text" id="m-foto" placeholder="https://...">

        <label class="label-f">Notas</label>
        <textarea id="m-notas" rows="2"></textarea>

        <button class="btn-principal" id="btn-guardar" onclick="guardarMaterial()">GUARDAR EN STOCK</button>
        <button class="btn-edit" id="btn-cancelar" style="display:none; background:#ffebef; color:#d63384;" onclick="cancelarEdicion()">CANCELAR EDICIÓN</button>
    </div>

    <div id="seccion-materiales" style="display:none;">
        <div id="lista-stock" class="grid-estudio"></div>
    </div>

    <div id="seccion-proyectos" style="display:none; text-align: center;">
        <p>🎨 Sección en mantenimiento</p>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let lanasCargadas = [];

    function cambiarVista(v) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + v).classList.add('active');
        document.getElementById('seccion-inicio').style.display = v === 'INICIO' ? 'block' : 'none';
        document.getElementById('seccion-materiales').style.display = v === 'MATERIALES' ? 'block' : 'none';
        document.getElementById('seccion-proyectos').style.display = v === 'PROYECTOS' ? 'block' : 'none';
        if(v === 'MATERIALES') cargarStock();
    }

    async function guardarMaterial() {
        const id = document.getElementById('m-id').value;
        const material = {
            tipo_material: document.getElementById('m-nombre').value,
            categoria: document.getElementById('m-categoria').value,
            cantidad: parseInt(document.getElementById('m-cantidad').value),
            composicion: document.getElementById('m-composicion').value,
            grosor: document.getElementById('m-grosor').value,
            tienda: document.getElementById('m-tienda').value,
            contenido: document.getElementById('m-foto').value,
            notas: document.getElementById('m-notas').value
        };

        if(!material.tipo_material) return alert("Pon un nombre");

        let resultado;
        if(id) {
            // Actualizar existente
            resultado = await client.from('estudio_data').update(material).eq('id', id);
        } else {
            // Insertar nuevo
            resultado = await client.from('estudio_data').insert([material]);
        }

        if (resultado.error) {
            alert("Error: " + resultado.error.message);
        } else {
            alert(id ? "¡Actualizado!" : "¡Añadido!");
            cancelarEdicion();
            if(!id) limpiarForm();
        }
    }

    function prepararEdicion(id) {
        const m = lanasCargadas.find(item => item.id == id);
        if(!m) return;

        document.getElementById('m-id').value = m.id;
        document.getElementById('m-nombre').value = m.tipo_material;
        document.getElementById('m-categoria').value = m.categoria;
        document.getElementById('m-cantidad').value = m.cantidad;
        document.getElementById('m-composicion').value = m.composicion || "";
        document.getElementById('m-grosor').value = m.grosor || "";
        document.getElementById('m-tienda').value = m.tienda || "";
        document.getElementById('m-foto').value = m.contenido || "";
        document.getElementById('m-notas').value = m.notas || "";

        document.getElementById('titulo-form').innerText = "✍️ Editar Lana";
        document.getElementById('btn-guardar').innerText = "ACTUALIZAR CAMBIOS";
        document.getElementById('modo-edicion').style.display = "block";
        document.getElementById('btn-cancelar').style.display = "block";
        
        cambiarVista('INICIO');
        window.scrollTo(0,0);
    }

    function cancelarEdicion() {
        document.getElementById('m-id').value = "";
        document.getElementById('titulo-form').innerText = "🧶 Nueva Lana";
        document.getElementById('btn-guardar').innerText = "GUARDAR EN STOCK";
        document.getElementById('modo-edicion').style.display = "none";
        document.getElementById('btn-cancelar').style.display = "none";
        limpiarForm();
    }

    function limpiarForm() {
        document.querySelectorAll('input, textarea').forEach(el => el.id !== 'm-id' ? el.value = "" : null);
        document.getElementById('m-cantidad').value = "1";
    }

    async function cargarStock() {
        const { data, error } = await client.from('estudio_data').select('*').order('created_at', {ascending: false});
        if(data) {
            lanasCargadas = data;
            document.getElementById('lista-stock').innerHTML = data.map(m => `
                <div class="item-card">
                    <div class="foto-material">${m.contenido ? `<img src="${m.contenido}" style="width:100%;height:100%;object-fit:cover;">` : '🧶'}</div>
                    <div class="info-material">
                        <h4>${m.tipo_material}</h4>
                        <p>${m.composicion || ''} ${m.grosor ? '· '+m.grosor : ''}</p>
                        <div class="badge-cantidad">${m.cantidad} uds</div>
                        <button class="btn-edit" onclick="prepararEdicion(${m.id})">✏️ MODIFICAR</button>
                    </div>
                </div>
            `).join('');
        }
    }

    async function cargarInicial() {
        const { data } = await client.from('Secciones').select('nombre');
        if(data) {
            document.getElementById('m-categoria').innerHTML = data.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
        }
    }

    window.onload = cargarInicial;
</script>
</body>
</html>
