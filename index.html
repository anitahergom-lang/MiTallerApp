<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mi Estudio Creativo</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --primario: #6200ee;
            --fondo: #f5f5f5;
            --tarjeta: #ffffff;
            --texto: #333333;
            --borde: #dddddd;
        }

        [data-theme="dark"] {
            --primario: #bb86fc;
            --fondo: #121212;
            --tarjeta: #1e1e1e;
            --texto: #e1e1e1;
            --borde: #333333;
        }

        body { 
            background: var(--fondo); 
            color: var(--texto);
            font-family: 'Segoe UI', system-ui, sans-serif; 
            transition: all 0.3s ease;
            margin: 0;
            padding: 20px;
            padding-top: env(safe-area-inset-top);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .logo {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            object-fit: cover;
        }

        .theme-toggle {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 9999;
            background: var(--primario);
            color: white;
            border: none;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            font-size: 22px;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .seccion-diseno {
            background: var(--tarjeta);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--borde);
            text-align: center;
        }

        .silueta-img {
            max-width: 100%;
            height: auto;
            border-radius: 10px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .boton-menu {
            background: var(--tarjeta);
            border: 1px solid var(--borde);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            color: var(--texto);
        }
    </style>
</head>
<body>

    <button class="theme-toggle" id="themeBtn" onclick="toggleTheme()">☀️</button>

    <div class="header">
        <img src="icon.png" alt="Logo" class="logo">
        <h1>Mi Estudio</h1>
    </div>

    <div class="seccion-diseno">
        <h3>Boceto Actual</h3>
        <img src="Silueta 3 cuerpos.jpg" alt="Silueta" class="silueta-img">
    </div>

    <div class="menu-grid">
        <div class="boton-menu">LANAS</div>
        <div class="boton-menu">TELAS</div>
        <div class="boton-menu">BOTONES</div>
        <div class="boton-menu">PROYECTOS</div>
    </div>

    <script>
        function toggleTheme() {
            const body = document.documentElement;
            const btn = document.getElementById('themeBtn');
            
            if (body.getAttribute('data-theme') === 'dark') {
                body.removeAttribute('data-theme');
                btn.innerText = '☀️';
                localStorage.setItem('tema', 'claro');
            } else {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = '🌙';
                localStorage.setItem('tema', 'oscuro');
            }
        }

        // Cargar preferencia al iniciar
        if (localStorage.getItem('tema') === 'oscuro') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('themeBtn').innerText = '🌙';
        }
    </script>
</body>
</html>
