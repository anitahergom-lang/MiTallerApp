<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --t: #4a4a4a; --br: #f1e1e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--t); margin: 0; padding: 15px; }
        
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 20px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 20px; }
        .btn-nav { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 15px; font-size: 10px; text-transform: uppercase; }
        .btn-nav.active { background: var(--pc); color: var(--s); border-bottom: 3px solid var(--s); }

        .card-registro { background: var(--b); padding: 20px; border-radius: 25px; border: 1px solid var(--br); max-width: 500px; margin: auto; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--br); border-radius: 12px; font-size: 14px; box-sizing: border-box; }
        
        /* Lienzos de Dibujo */
        .contenedor-dibujo { position: relative; width: 100%; background: #fff; border: 2px solid var(--br); border-radius: 15px; margin-bottom: 10px; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100%; cursor: crosshair; }
        
        /* Barra de herramientas de cada lienzo */
        .toolbar-dibujo { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #fff5f7; border-top: 1px solid var(--br); }
        .colores { display: flex; gap: 8px; }
        .btn-color { width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; cursor: pointer; box-shadow: 0 0 3px rgba(0,0,0,0.2); }
        .btn-borrar-trazo { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 8px; font-size: 11px; cursor: pointer; font-weight: bold; }
        
        .btn-principal { background: var(--p); color: white; padding: 16px; border: none; border-radius: 18px; width: 100%; font-weight: bold; cursor: pointer; font-size: 15px; box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3); }
        .label-tit { font-size: 13px; font-weight: bold; color: var(--s); margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

    <div class="menu-secciones">
        <button class="btn-nav active" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 Inicio</button>
        <button class="btn-nav" id="nav-MATERIALES" onclick="cambiarVista('MATERIALES')">📦 Stock</button>
        <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 Ideas</button>
    </div>

    <!-- SECCIÓN PROYECTOS -->
    <div id="seccion-proyectos" style="display:none;">
        <div class="card-registro">
            <h3 style="text-align:center; color:var(--s); margin-top:0;">🎨 Nuevo Diseño Creativo</h3>
            
            <input type="text" id="p-nombre" placeholder="Nombre de la creación...">
            
            <!-- FIGURINES -->
            <span class="label-tit">👗 Diseñar sobre figurines:</span>
            <div class="contenedor-dibujo">
                <canvas id="canvas-figurines" width="400" height="350" style="background: url('https://img.freepik.com/vector-premium/plantilla-figuras-moda-nueve-cabezas-proporcion-mujer_491904-55.jpg') center/contain no-repeat;"></canvas>
                <div class="toolbar-dibujo">
                    <div class="colores">
                        <div class="btn-color" style="background:#000000" onclick="setPincel('black')"></div>
                        <div class="btn-color" style="background:#ff85a2" onclick="setPincel('#ff85a2')"></div>
                        <div class="btn-color" style="background:#4da6ff" onclick="setPincel('#4da6ff')"></div>
                    </div>
                    <button class="btn-borrar-trazo" onclick="limpiarCanvas('canvas-figurines')">Limpiar Dibujo</button>
                </div>
            </div>

            <!-- PUNTOS -->
            <span class="label-tit">🧶 Patrón de puntos / Muestra:</span>
            <div class="contenedor-dibujo">
                <canvas id="canvas-puntos" width="400" height="180" style="background:#ffffff;"></canvas>
                <div class="toolbar-dibujo">
                    <div class="colores">
                        <div class="btn-color" style="background:#000000" onclick="setPincel('black')"></div>
                        <div class="btn-color" style="background:#8c52ff" onclick="setPincel('#8c52ff')"></div>
                    </div>
                    <button class="btn-borrar-trazo" onclick="limpiarCanvas('canvas-puntos')">Borrar Puntos</button>
                </div>
            </div>

            <!-- PDF Y NOTAS -->
            <span class="label-tit">📄 Adjuntar Patrón (PDF):</span>
            <input type="file" id="p-pdf" accept=".pdf">
            
            <span class="label-tit">📝 Notas y Medidas:</span>
            <textarea id="p-notas" placeholder="Ej: Agujas 3.5mm, 4 ovillos de seda..." rows="3"></textarea>
            
            <button class="btn-principal" onclick="guardarTodo()">✨ GUARDAR PROYECTO</button>
        </div>
    </div>

<script>
    let pincelActivo = 'black';
    const canvases = ['canvas-figurines', 'canvas-puntos'];

    function initCanvases() {
        canvases.forEach(id => {
            const cv = document.getElementById(id);
            const ctx = cv.getContext('2d');
            let dibujando = false;

            const obtenerPos = (e) => {
                const rect = cv.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const empezar = (e) => { dibujando = true; ctx.beginPath(); const p = obtenerPos(e); ctx.moveTo(p.x, p.y); e.preventDefault(); };
            const mover = (e) => { 
                if (!dibujando) return; 
                const p = obtenerPos(e); 
                ctx.lineWidth = 2; 
                ctx.lineCap = 'round'; 
                ctx.strokeStyle = pincelActivo; 
                ctx.lineTo(p.x, p.y); 
                ctx.stroke(); 
                e.preventDefault();
            };
            const parar = () => { dibujando = false; };

            cv.addEventListener('mousedown', empezar);
            cv.addEventListener('mousemove', mover);
            cv.addEventListener('mouseup', parar);
            cv.addEventListener('touchstart', empezar, {passive: false});
            cv.addEventListener('touchmove', mover, {passive: false});
            cv.addEventListener('touchend', parar);
        });
    }

    function setPincel(color) { pincelActivo = color; }
    
    function limpiarCanvas(id) {
        const cv = document.getElementById(id);
        cv.getContext('2d').clearRect(0, 0, cv.width, cv.height);
    }

    async function guardarTodo() {
        const nom = document.getElementById('p-nombre').value;
        if(!nom) return alert("Por favor, ponle un nombre al proyecto");

        const data = {
            nombre: nom,
            boceto: document.getElementById('canvas-figurines').toDataURL(),
            puntos: document.getElementById('canvas-puntos').toDataURL(),
            notas: document.getElementById('p-notas').value,
            fecha: new Date()
        };

        console.log("Guardando...", data);
        alert("¡Proyecto '" + nom + "' guardado con éxito!");
        // Aquí iría el insert a Supabase: await client.from('proyectos').insert([data]);
    }

    function cambiarVista(v) {
        document.getElementById('seccion-proyectos').style.display = (v === 'PROYECTOS' ? 'block' : 'none');
        // (Añadir lógica para las otras secciones de materiales aquí)
    }

    window.onload = initCanvases;
</script>
</body>
</html>
