<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --t: #4a4a4a; --br: #f1e1e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--t); margin: 0; padding: 15px; }
        
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 20px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-nav { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 15px; font-size: 10px; text-transform: uppercase; }
        .btn-nav.active { background: var(--pc); color: var(--s); border-bottom: 3px solid var(--s); }

        .card-registro { background: var(--b); padding: 20px; border-radius: 25px; border: 1px solid var(--br); max-width: 500px; margin: auto; margin-bottom: 20px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--br); border-radius: 12px; font-size: 14px; box-sizing: border-box; }
        
        .contenedor-dibujo { position: relative; width: 100%; background: #fff; border: 2px solid var(--br); border-radius: 15px; margin-bottom: 10px; overflow: hidden; touch-action: none; }
        canvas { display: block; width: 100%; cursor: crosshair; }
        
        /* AQUÍ ESTÁ TU SILUETA INTEGRADA */
        #canvas-figurines { 
            background-image: url('https://i.ibb.co/L6V2Mvx/Silueta-3-cuerpos-2.jpg'); 
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .toolbar-dibujo { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; background: #fff5f7; border-top: 1px solid var(--br); }
        .colores { display: flex; gap: 8px; }
        .btn-color { width: 22px; height: 22px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
        
        .grid-estudio { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .item-card { background: var(--b); padding: 10px; border-radius: 15px; border: 1px solid var(--br); text-align: center; }
        .item-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 10px; }

        .btn-principal { background: var(--p); color: white; padding: 16px; border: none; border-radius: 18px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-borrar-trazo { background: #ff4d4d; color: white; border: none; padding: 5px 10px; border-radius: 8px; font-size: 11px; }
    </style>
</head>
<body>

    <div class="menu-secciones">
        <button class="btn-nav active" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 Inicio</button>
        <button class="btn-nav" id="nav-MATERIALES" onclick="cambiarVista('MATERIALES')">📦 Stock</button>
        <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 Ideas</button>
    </div>

    <!-- SECCIÓN INICIO (Se mantiene igual) -->
    <div id="seccion-inicio" class="card-registro">
        <h3 style="text-align:center; color:var(--s); margin-top:0;">✨ Nuevo Material</h3>
        <input type="text" id="m-nombre" placeholder="Nombre del material">
        <select id="m-categoria"></select>
        <input type="number" id="m-cantidad" placeholder="Cantidad" value="1">
        <button class="btn-principal" onclick="guardarMaterial()">AÑADIR AL TALLER</button>
    </div>

    <!-- SECCIÓN MATERIALES (Se mantiene igual) -->
    <div id="seccion-materiales" style="display:none;">
        <div id="lista-stock" class="grid-estudio"></div>
    </div>

    <!-- SECCIÓN PROYECTOS (Solo hemos cambiado la silueta) -->
    <div id="seccion-proyectos" style="display:none;">
        <div class="card-registro">
            <h3 style="text-align:center; color:var(--s); margin-top:0;">🎨 Nuevo Diseño</h3>
            <input type="text" id="p-nombre" placeholder="Nombre de la prenda...">
            
            <label style="font-size:12px; font-weight:bold;">👗 Dibujar sobre tu silueta:</label>
            <div class="contenedor-dibujo">
                <canvas id="canvas-figurines" width="500" height="500"></canvas>
                <div class="toolbar-dibujo">
                    <div class="colores">
                        <div class="btn-color" style="background:black" onclick="pincelColor='black'"></div>
                        <div class="btn-color" style="background:#ff85a2" onclick="pincelColor='#ff85a2'"></div>
                    </div>
                    <button class="btn-borrar-trazo" onclick="limpiarC('canvas-figurines')">Limpiar Silueta</button>
                </div>
            </div>

            <label style="font-size:12px; font-weight:bold;">🧶 Esquema de puntos:</label>
            <div class="contenedor-dibujo">
                <canvas id="canvas-puntos" width="500" height="200" style="background:white;"></canvas>
                <div class="toolbar-dibujo">
                    <button class="btn-borrar-trazo" onclick="limpiarC('canvas-puntos')">Limpiar Puntos</button>
                </div>
            </div>

            <label style="font-size:12px; font-weight:bold;">📄 Archivo PDF:</label>
            <input type="file" id="p-pdf" accept=".pdf">
            <textarea id="p-notas" placeholder="Anotaciones extras..." rows="3"></textarea>
            
            <button class="btn-principal" onclick="alert('Proyecto guardado')">💾 GUARDAR TODO</button>
        </div>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let pincelColor = 'black';

    // Funciones de navegación y carga (Sin cambios)
    function cambiarVista(v) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + v).classList.add('active');
        document.getElementById('seccion-inicio').style.display = v === 'INICIO' ? 'block' : 'none';
        document.getElementById('seccion-materiales').style.display = v === 'MATERIALES' ? 'block' : 'none';
        document.getElementById('seccion-proyectos').style.display = v === 'PROYECTOS' ? 'block' : 'none';
        if(v === 'MATERIALES') cargarStock();
    }

    // Lógica de dibujo (Sin cambios)
    function initDibujo(id) {
        const cv = document.getElementById(id);
        const ctx = cv.getContext('2d');
        let pintando = false;

        const getPos = (e) => {
            const rect = cv.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (cv.width / rect.width),
                y: (clientY - rect.top) * (cv.height / rect.height)
            };
        };

        const start = (e) => { pintando = true; ctx.beginPath(); const p = getPos(e); ctx.moveTo(p.x, p.y); if(e.touches) e.preventDefault(); };
        const move = (e) => { if(!pintando) return; const p = getPos(e); ctx.strokeStyle = pincelColor; ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.lineTo(p.x, p.y); ctx.stroke(); if(e.touches) e.preventDefault(); };
        const stop = () => pintando = false;

        cv.addEventListener('mousedown', start); cv.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
        cv.addEventListener('touchstart', start, {passive:false}); cv.addEventListener('touchmove', move, {passive:false}); cv.addEventListener('touchend', stop);
    }

    function limpiarC(id) { document.getElementById(id).getContext('2d').clearRect(0,0,1000,1000); }

    // Conexión Supabase (Sin cambios)
    async function cargarInicial() {
        const { data: cats } = await client.from('Secciones').select('nombre');
        if(cats) document.getElementById('m-categoria').innerHTML = cats.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
    }

    async function cargarStock() {
        const { data: stock } = await client.from('estudio_data').select('*').order('created_at', {ascending: false});
        if(stock) {
            document.getElementById('lista-stock').innerHTML = stock.map(m => `
                <div class="item-card">
                    <p><b>${m.tipo_material}</b></p>
                    <span style="color:var(--s);">Cant: ${m.cantidad || 0}</span>
                </div>
            `).join('');
        }
    }

    async function guardarMaterial() {
        const nom = document.getElementById('m-nombre').value;
        const cat = document.getElementById('m-categoria').value;
        const can = document.getElementById('m-cantidad').value;
        if(!nom) return alert("Falta nombre");
        await client.from('estudio_data').insert([{ tipo_material: nom, categoria: cat, cantidad: parseInt(can) }]);
        alert("¡Guardado!");
    }

    window.onload = () => {
        cargarInicial();
        initDibujo('canvas-figurines');
        initDibujo('canvas-puntos');
    };
</script>
</body>
</html>
