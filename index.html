<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa - Tres Cuerpos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --br: #f1e1e5; --txt: #444; 
        }
        [data-theme="dark"] {
            --p: #ff85a2; --pc: #4a2b34; --s: #f06292; --f: #121212; --b: #1e1e1e; --br: #333333; --txt: #fce4ec;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--txt); margin: 0; padding: 15px; padding-bottom: 80px; transition: 0.3s; }
        
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 50px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .btn-nav { flex: 1; padding: 10px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 40px; font-size: 10px; text-transform: uppercase; }
        .btn-nav.active { background: var(--pc); color: var(--s); border: 1px solid var(--p); }

        .card-form { background: var(--b); padding: 20px; border-radius: 25px; border: 1px solid var(--br); max-width: 500px; margin: 0 auto; }
        label { display: block; font-size: 11px; color: var(--s); font-weight: 700; margin: 10px 0 4px 4px; }
        
        .canvas-container { background: white; border: 1px solid var(--br); border-radius: 15px; margin-top: 10px; position: relative; overflow: hidden; height: 350px; }
        canvas { display: block; width: 100%; height: 100%; touch-action: none; }
        
        .canvas-tools { display: flex; gap: 5px; margin-top: 5px; margin-bottom: 15px; }
        .btn-tool { flex: 1; padding: 8px; font-size: 12px; border: 1px solid var(--br); border-radius: 8px; background: var(--b); cursor: pointer; color: var(--txt); }
        .btn-tool.active { background: var(--pc); border-color: var(--p); color: var(--s); }
        
        .btn-grande { width: 100%; background: var(--p); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="menu-secciones">
    <button class="btn-nav active">🎨 DISEÑO</button>
</div>

<div class="card-form">
    <h2 style="color:var(--s); text-align:center; margin-top:0;">Diseño 3 Cuerpos</h2>

    <label>BOCETO SOBRE SILUETA</label>
    <div class="canvas-container">
        <!-- El canvas donde dibujaremos -->
        <canvas id="canvas-cuerpos"></canvas>
    </div>
    
    <div class="canvas-tools">
        <button class="btn-tool active" id="btn-pincel" onclick="cambiarHerramienta('pincel')">🖌️ Pincel</button>
        <button class="btn-tool" id="btn-goma" onclick="cambiarHerramienta('goma')">🧽 Goma</button>
        <button class="btn-tool" onclick="limpiar()">🗑️ Limpiar</button>
    </div>

    <button class="btn-grande">GUARDAR DISEÑO</button>
</div>

<script>
    const canvas = document.getElementById('canvas-cuerpos');
    const ctx = canvas.getContext('2d');
    let dibujando = false;
    let herramientaActual = 'pincel';

    // LA IMAGEN EN BASE64 (Sustituye esta cadena por la larga que genera el convertidor si deseas otra)
    // He puesto una silueta esquemática de 3 figuras como ejemplo integrado
    const imgFondo = new Image();
    imgFondo.src = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAZAAAAGQAQMAAAC6ca9vAAAAA1BMVEUAAACnej3aAAAAAXRSTlMAQObYZgAAAC5JREFUGBntwTEBAAAAwiD7p7bGDmAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAK8At6AAAd76Z4gAAAAASUVORK5CYII='; 
    // ^ Nota: He usado un placeholder. DEBES PEGAR AQUÍ TU CADENA LARGA si tienes una específica.

    function ajustarResolucion() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width;
        canvas.height = rect.height;
        dibujarFondo();
    }

    function dibujarFondo() {
        // Dibujamos la imagen de los cuerpos al fondo
        ctx.drawImage(imgFondo, 0, 0, canvas.width, canvas.height);
    }

    imgFondo.onload = ajustarResolucion;
    window.addEventListener('resize', ajustarResolucion);

    // Lógica de dibujo
    function empezarDibujo(e) {
        dibujando = true;
        ctx.beginPath();
        const { x, y } = obtenerCoordenadas(e);
        ctx.moveTo(x, y);
    }

    function dibujar(e) {
        if (!dibujando) return;
        e.preventDefault();
        const { x, y } = obtenerCoordenadas(e);

        ctx.lineWidth = herramientaActual === 'pincel' ? 3 : 20;
        ctx.lineCap = 'round';
        ctx.strokeStyle = herramientaActual === 'pincel' ? '#f06292' : '#ffffff';
        
        // Si es goma, usamos 'destination-out' para borrar o pintamos de blanco si el fondo es sólido
        if(herramientaActual === 'goma') {
            ctx.globalCompositeOperation = 'destination-out';
            ctx.lineWidth = 30;
        } else {
            ctx.globalCompositeOperation = 'source-over';
        }

        ctx.lineTo(x, y);
        ctx.stroke();
    }

    function detenerDibujo() {
        dibujando = false;
        ctx.globalCompositeOperation = 'source-over'; // Resetear para que el fondo no se borre
    }

    function obtenerCoordenadas(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function cambiarHerramienta(tool) {
        herramientaActual = tool;
        document.getElementById('btn-pincel').classList.toggle('active', tool === 'pincel');
        document.getElementById('btn-goma').classList.toggle('active', tool === 'goma');
    }

    function limpiar() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dibujarFondo();
    }

    // Eventos de ratón y táctiles
    canvas.addEventListener('mousedown', empezarDibujo);
    canvas.addEventListener('mousemove', dibujar);
    window.addEventListener('mouseup', detenerDibujo);

    canvas.addEventListener('touchstart', empezarDibujo);
    canvas.addEventListener('touchmove', dibujar);
    canvas.addEventListener('touchend', detenerDibujo);

</script>

</body>
</html>
