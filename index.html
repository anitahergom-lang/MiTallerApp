<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { 
            --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --br: #f1e1e5; --txt: #444; 
        }
        [data-theme="dark"] {
            --p: #ff85a2; --pc: #4a2b34; --s: #f06292; --f: #121212; --b: #1e1e1e; --br: #333333; --txt: #fce4ec;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--txt); margin: 0; padding: 15px; transition: 0.3s; padding-bottom: 80px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-icon { background: var(--pc); border: none; padding: 10px; border-radius: 12px; cursor: pointer; font-size: 1.2rem; }

        /* MENU PRINCIPAL */
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 20px; }
        .menu-item { background: var(--b); padding: 20px; border-radius: 20px; text-align: center; border: 2px solid var(--br); cursor: pointer; transition: 0.3s; }
        .menu-item:active { transform: scale(0.95); }
        .menu-item i { font-size: 2.5rem; display: block; margin-bottom: 10px; }

        /* SECCIONES */
        .section { display: none; animation: fadeIn 0.3s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* POST-ITS */
        .muro { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .post-it { padding: 15px; border-radius: 10px; min-height: 120px; position: relative; cursor: pointer; box-shadow: 3px 3px 10px rgba(0,0,0,0.1); transform: rotate(-1deg); }
        .p-rosa { background: #ffc1e3; } .p-azul { background: #c1e3ff; } .p-verde { background: #c1ffda; } .p-amarillo { background: #fffec1; }

        /* MODALES */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: var(--b); padding: 20px; border-radius: 20px; width: 90%; max-width: 400px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--br); border-radius: 10px; box-sizing: border-box; font-family: inherit; }
        
        .nav-bottom { position: fixed; bottom: 0; left: 0; width: 100%; background: var(--b); display: flex; justify-content: space-around; padding: 15px 0; border-top: 2px solid var(--br); }
    </style>
</head>
<body>

    <div class="header">
        <h1 id="main-title">🌸 Mi Taller Rosa</h1>
        <button class="btn-icon" onclick="toggleTheme()">🌓</button>
    </div>

    <div id="sec-inicio" class="section active">
        <div class="menu-grid">
            <div class="menu-item" onclick="showSection('sec-notas')"><i>📝</i>Notas</div>
            <div class="menu-item" onclick="showSection('sec-stock')"><i>📦</i>Stock</div>
            <div class="menu-item" onclick="showSection('sec-compras')"><i>🛒</i>Compras</div>
            <div class="menu-item" onclick="showSection('sec-calc')"><i>🧮</i>Calculadora</div>
        </div>
    </div>

    <div id="sec-notas" class="section">
        <div style="display:flex; justify-content: space-between; margin-bottom:15px;">
            <button class="btn-icon" onclick="showSection('sec-inicio')">⬅️</button>
            <button class="btn-icon" onclick="abrirModalNota()">➕ Nueva Nota</button>
        </div>
        <div id="muro-notas" class="muro"></div>
    </div>

    <div id="sec-stock" class="section">
        <button class="btn-icon" onclick="showSection('sec-inicio')">⬅️ Volver</button>
        <h2>📦 Mi Inventario</h2>
        <p>Próximamente...</p>
    </div>

    <div id="modal-nota" class="modal">
        <div class="modal-content">
            <h3 id="modal-nota-titulo">Nueva Nota</h3>
            <input type="hidden" id="nota-id-edit">
            <input type="text" id="n-titulo" placeholder="Título...">
            <textarea id="n-contenido" rows="5" placeholder="Escribe aquí..."></textarea>
            <input type="text" id="n-url" placeholder="URL (opcional)...">
            <button class="btn-icon" style="width:100%; background:var(--p); color:white;" onclick="guardarNota()">💾 Guardar</button>
            <button class="btn-icon" style="width:100%; margin-top:10px;" onclick="cerrarModalNota()">Cancelar</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN SUPABASE
        const supabaseUrl = 'TU_URL_AQUÍ'; // Pon aquí tu URL
        const supabaseKey = 'TU_KEY_AQUÍ'; // Pon aquí tu Key
        const client = supabase.createClient(supabaseUrl, supabaseKey);

        const coloresPostIt = ['p-rosa', 'p-azul', 'p-verde', 'p-amarillo'];

        function showSection(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'sec-notas') cargarNotas();
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('tema-preferido', target);
        }

        // --- FUNCIONES DE NOTAS CORREGIDAS ---
        async function cargarNotas() {
            const { data, error } = await client.from('notas').select('*').order('fecha', { ascending: false });
            if (error) return console.error(error);

            const muro = document.getElementById('muro-notas');
            muro.innerHTML = '';
            data.forEach((n, index) => {
                const div = document.createElement('div');
                div.className = `post-it ${coloresPostIt[index % 4]}`;
                const textoFinal = n.texto || n.contenido || '';
                div.onclick = () => abrirModalNota(n.id, n.titulo, textoFinal, n.url);
                div.innerHTML = `<h3>${n.titulo || ''}</h3><p>${textoFinal}</p>`;
                muro.appendChild(div);
            });
        }

        async function guardarNota() {
            const id = document.getElementById('nota-id-edit').value;
            const val = document.getElementById('n-contenido').value;
            const notaData = {
                titulo: document.getElementById('n-titulo').value,
                texto: val,
                contenido: val,
                url: document.getElementById('n-url').value,
                fecha: new Date().toISOString()
            };

            let res = id ? await client.from('notas').update(notaData).eq('id', id) : await client.from('notas').insert([notaData]);
            if (!res.error) { cerrarModalNota(); cargarNotas(); }
            else { alert("Error: " + res.error.message); }
        }

        function abrirModalNota(id='', tit='', cont='', url='') {
            document.getElementById('nota-id-edit').value = id;
            document.getElementById('n-titulo').value = tit;
            document.getElementById('n-contenido').value = cont;
            document.getElementById('n-url').value = url;
            document.getElementById('modal-nota').style.display = 'flex';
        }

        function cerrarModalNota() { document.getElementById('modal-nota').style.display = 'none'; }

        window.onload = () => {
            const t = localStorage.getItem('tema-preferido');
            if(t) document.documentElement.setAttribute('data-theme', t);
        }
    </script>
</body>
</html>
