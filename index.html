<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa - Edición Avanzada</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --t: #4a4a4a; --br: #f1e1e5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--f); color: var(--t); margin: 0; padding: 15px; }
        
        /* Navegación */
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 20px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-nav { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 600; color: #888; cursor: pointer; border-radius: 15px; font-size: 10px; text-transform: uppercase; }
        .btn-nav.active { background: var(--pc); color: var(--s); border-bottom: 3px solid var(--s); }

        /* Formulario y Tarjetas */
        .card-registro { background: var(--b); padding: 20px; border-radius: 25px; border: 1px solid var(--br); max-width: 600px; margin: auto; margin-bottom: 20px; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--br); border-radius: 12px; font-size: 14px; box-sizing: border-box; }
        textarea { grid-column: span 2; }
        
        .label-f { font-size: 11px; font-weight: bold; color: var(--s); margin-left: 5px; text-transform: uppercase; }

        /* Listado de Lanas */
        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .item-card { background: var(--b); border-radius: 20px; border: 1px solid var(--br); overflow: hidden; position: relative; display: flex; flex-direction: column; }
        .foto-material { width: 100%; height: 140px; object-fit: cover; background: #fff0f3; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .info-material { padding: 12px; flex-grow: 1; }
        .info-material h4 { margin: 0; color: var(--s); font-size: 16px; }
        .info-material p { margin: 4px 0; font-size: 12px; color: #666; line-height: 1.3; }
        
        .badge-cantidad { background: var(--p); color: white; padding: 4px 8px; border-radius: 10px; font-weight: bold; font-size: 12px; display: inline-block; margin-top: 5px; }

        .btn-principal { background: var(--p); color: white; padding: 16px; border: none; border-radius: 18px; width: 100%; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(255, 133, 162, 0.3); }
        .btn-accion { padding: 8px; border-radius: 10px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; }
        .btn-edit { background: #e3f2fd; color: #1976d2; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <div class="menu-secciones">
        <button class="btn-nav active" id="nav-INICIO" onclick="cambiarVista('INICIO')">✨ Registro</button>
        <button class="btn-nav" id="nav-MATERIALES" onclick="cambiarVista('MATERIALES')">🧶 Mi Stock</button>
        <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 Ideas</button>
    </div>

    <!-- SECCIÓN REGISTRO -->
    <div id="seccion-inicio" class="card-registro">
        <h3 style="text-align:center; color:var(--s); margin-top:0;">🧶 Nueva Lana / Material</h3>
        
        <label class="label-f">Nombre del producto *</label>
        <input type="text" id="m-nombre" placeholder="Ej: Malabrigo Rios">
        
        <div class="grid-inputs">
            <div>
                <label class="label-f">Categoría</label>
                <select id="m-categoria"></select>
            </div>
            <div>
                <label class="label-f">Cantidad (Ovillos/Metros)</label>
                <input type="number" id="m-cantidad" value="1">
            </div>
            <div>
                <label class="label-f">Composición</label>
                <input type="text" id="m-composicion" placeholder="Ej: 100% Lana">
            </div>
            <div>
                <label class="label-f">Grosor (WPI/Ply)</label>
                <input type="text" id="m-grosor" placeholder="Ej: Worsted">
            </div>
        </div>

        <label class="label-f">¿Dónde lo compraste?</label>
        <input type="text" id="m-tienda" placeholder="Tienda física o URL">

        <label class="label-f">Foto (Opcional)</label>
        <input type="text" id="m-foto" placeholder="Pega el enlace de la imagen">

        <label class="label-f">Notas adicionales</label>
        <textarea id="m-notas" rows="3" placeholder="Lote, número de tinte, suavidad..."></textarea>

        <button class="btn-principal" onclick="guardarMaterial()">AÑADIR AL STOCK</button>
    </div>

    <!-- SECCIÓN STOCK -->
    <div id="seccion-materiales" style="display:none;">
        <div id="lista-stock" class="grid-estudio">
            <!-- Aquí cargan las lanas -->
        </div>
    </div>

    <!-- SECCIÓN PROYECTOS (Vaciada para avanzar luego) -->
    <div id="seccion-proyectos" style="display:none; text-align: center; padding: 20px;">
        <p>🎨 Sección de dibujo en pausa...</p>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    // Navegación
    function cambiarVista(v) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + v).classList.add('active');
        document.getElementById('seccion-inicio').style.display = v === 'INICIO' ? 'block' : 'none';
        document.getElementById('seccion-materiales').style.display = v === 'MATERIALES' ? 'block' : 'none';
        document.getElementById('seccion-proyectos').style.display = v === 'PROYECTOS' ? 'block' : 'none';
        if(v === 'MATERIALES') cargarStock();
    }

    // Guardar en Supabase
    async function guardarMaterial() {
        const material = {
            tipo_material: document.getElementById('m-nombre').value,
            categoria: document.getElementById('m-categoria').value,
            cantidad: parseInt(document.getElementById('m-cantidad').value),
            composicion: document.getElementById('m-composicion').value, // Campo nuevo
            grosor: document.getElementById('m-grosor').value,           // Campo nuevo
            tienda: document.getElementById('m-tienda').value,           // Campo nuevo
            contenido: document.getElementById('m-foto').value,           // Es la URL de la foto
            notas: document.getElementById('m-notas').value               // Campo nuevo
        };

        if(!material.tipo_material) return alert("¡El nombre es obligatorio!");

        const { error } = await client.from('estudio_data').insert([material]);
        
        if (error) {
            alert("Error al guardar: " + error.message);
        } else {
            alert("✨ " + material.tipo_material + " añadido con éxito!");
            limpiarFormulario();
        }
    }

    function limpiarFormulario() {
        document.querySelectorAll('input, textarea').forEach(el => el.value = "");
        document.getElementById('m-cantidad').value = "1";
    }

    // Cargar y mostrar el stock
    async function cargarStock() {
        const { data: stock, error } = await client.from('estudio_data').select('*').order('created_at', {ascending: false});
        
        if(stock) {
            document.getElementById('lista-stock').innerHTML = stock.map(m => `
                <div class="item-card">
                    ${m.contenido ? 
                        `<img src="${m.contenido}" class="foto-material">` : 
                        `<div class="foto-material">🧶</div>`
                    }
                    <div class="info-material">
                        <h4>${m.tipo_material}</h4>
                        <p><b>Comp:</b> ${m.composicion || 'N/A'}</p>
                        <p><b>Grosor:</b> ${m.grosor || 'N/A'}</p>
                        <p><b>Tienda:</b> ${m.tienda || 'Desconocida'}</p>
                        <div class="badge-cantidad">${m.cantidad} uds.</div>
                        <button class="btn-accion btn-edit" onclick="alert('Función modificar próximamente')">✏️ MODIFICAR</button>
                    </div>
                </div>
            `).join('');
        }
    }

    async function cargarCategorias() {
        const { data } = await client.from('Secciones').select('nombre');
        if(data) {
            document.getElementById('m-categoria').innerHTML = data.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join('');
        }
    }

    window.onload = () => {
        cargarCategorias();
    };
</script>
</body>
</html>
