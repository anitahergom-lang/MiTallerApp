<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa - Gestión de Stock</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { 
            --primario: #ff85a2; 
            --primario-claro: #fce4ec; 
            --secundario: #f06292; 
            --fondo: #fcf8f9; 
            --blanco: #ffffff; 
            --texto: #4a4a4a; 
            --borde: #f1e1e5; 
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--fondo); color: var(--texto); margin: 0; padding: 20px; }
        
        /* Navegación Superior */
        .menu-secciones { display: flex; gap: 10px; background: var(--blanco); padding: 10px; border-radius: 25px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--borde); margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-nav { flex: 1; padding: 12px; border: none; background: none; font-weight: bold; color: #aaa; cursor: pointer; border-radius: 15px; transition: 0.3s; }
        .btn-nav.active { background: var(--primario-claro); color: var(--secundario); }

        /* Filtros de Categoría */
        .filtros-materiales { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0 15px 0; margin-bottom: 15px; scrollbar-width: none; }
        .btn-filtro { padding: 10px 20px; border-radius: 25px; border: 1px solid var(--borde); background: var(--blanco); white-space: nowrap; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .btn-filtro.active { background: var(--secundario); color: white; border-color: var(--secundario); transform: scale(1.05); }

        /* Grid de Productos */
        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .item-card { background: var(--blanco); padding: 15px; border-radius: 20px; border: 1px solid var(--borde); text-align: center; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .item-card img { width: 100%; height: 130px; object-fit: cover; border-radius: 15px; margin-bottom: 10px; }
        
        .badge-cat { font-size: 10px; color: var(--secundario); background: var(--primario-claro); padding: 2px 8px; border-radius: 10px; display: inline-block; margin-bottom: 5px; }
        
        /* Controles */
        .btn-editar { position: absolute; top: 8px; left: 8px; background: #FFC107; border: none; border-radius: 50%; width: 28px; height: 28px; color: white; cursor: pointer; }
        .btn-eliminar { position: absolute; top: 8px; right: 8px; background: #ff5252; border: none; border-radius: 50%; width: 28px; height: 28px; color: white; cursor: pointer; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid var(--borde); border-radius: 12px; box-sizing: border-box; outline: none; }
        .btn-principal { background: var(--primario); color: white; padding: 16px; border: none; border-radius: 15px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

    <div class="menu-secciones">
        <button class="btn-nav active" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 REGISTRO</button>
        <button class="btn-nav" id="nav-MATERIALES" onclick="cambiarVista('MATERIALES')">📦 MI STOCK</button>
    </div>

    <div id="contenedor-filtros" class="filtros-materiales" style="display:none;"></div>

    <!-- VISTA REGISTRO -->
    <div id="seccion-registro" style="max-width: 500px; margin: auto;">
        <div style="background: var(--blanco); padding: 25px; border-radius: 25px; border: 1px solid var(--borde);">
            <h3 id="titulo-form" style="margin-top:0; color:var(--secundario)">🌸 Nuevo Material</h3>
            <input type="text" id="m-nombre" placeholder="Nombre del producto">
            <select id="m-categoria"></select>
            <input type="number" id="m-cantidad" placeholder="Cantidad" value="1">
            <input type="file" id="m-foto" accept="image/*">
            <button class="btn-principal" onclick="guardar()">AÑADIR AL TALLER</button>
        </div>
    </div>

    <!-- VISTA LISTADO -->
    <div id="seccion-listado" style="display:none;">
        <div id="lista-stock" class="grid-estudio"></div>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let stockGlobal = [];
    let categoriasBotones = [];
    let editandoId = null;

    async function iniciar() {
        // 1. Cargar las categorías de la tabla Secciones
        const { data: catData } = await client.from('Secciones').select('nombre');
        categoriasBotones = catData ? catData.map(c => c.nombre.trim()) : [];
        
        // Rellenar el select del formulario
        const sel = document.getElementById('m-categoria');
        sel.innerHTML = categoriasBotones.map(c => `<option value="${c}">${c}</option>`).join('');

        // 2. Cargar los materiales
        await cargarDatos();
        
        // 3. Crear los botones de filtro
        renderFiltros();
    }

    async function cargarDatos() {
        const { data } = await client.from('estudio_data').select('*').order('created_at', { ascending: false });
        stockGlobal = data || [];
        renderStock(stockGlobal);
    }

    function renderStock(lista) {
        const contenedor = document.getElementById('lista-stock');
        if (lista.length === 0) {
            contenedor.innerHTML = "<p style='text-align:center; width:100%; color:#999; grid-column: 1/-1;'>No hay nada en esta categoría.</p>";
            return;
        }
        contenedor.innerHTML = lista.map(m => `
            <div class="item-card">
                <button class="btn-editar" onclick="prepararEdicion(${m.id})">✏️</button>
                <button class="btn-eliminar" onclick="eliminar(${m.id})">×</button>
                <img src="${m.contenido || 'https://via.placeholder.com/150/eee?text=Sin+Foto'}">
                <div class="badge-cat">${m.categoria || 'Sin categoría'}</div>
                <div style="font-weight:bold; font-size:14px;">${m.tipo_material}</div>
                <div style="color:var(--secundario); font-weight:bold; margin-top:5px;">Cant: ${m.cantidad}</div>
            </div>
        `).join('');
    }

    function renderFiltros() {
        const contenedor = document.getElementById('contenedor-filtros');
        let html = `<button class="btn-filtro active" onclick="filtrar('TODO', this)">✨ Todo</button>`;
        categoriasBotones.forEach(cat => {
            html += `<button class="btn-filtro" onclick="filtrar('${cat}', this)">🌸 ${cat}</button>`;
        });
        contenedor.innerHTML = html;
    }

    // --- FUNCIÓN DE FILTRADO CORREGIDA (INTEGRADA) ---
    function filtrar(busqueda, boton) {
        document.querySelectorAll('.btn-filtro').forEach(b => b.classList.remove('active'));
        boton.classList.add('active');

        if (busqueda === 'TODO') {
            renderStock(stockGlobal);
        } else {
            const filtrados = stockGlobal.filter(prod => {
                const catProducto = (prod.categoria || "").toLowerCase().trim();
                const catBuscada = busqueda.toLowerCase().trim();
                // Coincidencia parcial (Lana encuentra Lanas y viceversa)
                return catProducto.includes(catBuscada) || catBuscada.includes(catProducto);
            });
            renderStock(filtrados);
        }
    }

    function cambiarVista(vista) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + vista).classList.add('active');
        
        document.getElementById('seccion-registro').style.display = (vista === 'INICIO' ? 'block' : 'none');
        document.getElementById('seccion-listado').style.display = (vista === 'MATERIALES' ? 'block' : 'none');
        document.getElementById('contenedor-filtros').style.display = (vista === 'MATERIALES' ? 'flex' : 'none');
        
        if(vista === 'MATERIALES') cargarDatos();
    }

    async function guardar() {
        const nombre = document.getElementById('m-nombre').value;
        const cat = document.getElementById('m-categoria').value;
        if (!nombre) return alert("Por favor, pon un nombre");

        const payload = {
            tipo_material: nombre,
            categoria: cat,
            cantidad: parseInt(document.getElementById('m-cantidad').value) || 0
        };

        const foto = document.getElementById('m-foto').files[0];
        if (foto) {
            const fileName = `img_${Date.now()}`;
            const { data } = await client.storage.from('media').upload(fileName, foto);
            if (data) payload.contenido = client.storage.from('media').getPublicUrl(fileName).data.publicUrl;
        }

        if (editandoId) {
            await client.from('estudio_data').update(payload).eq('id', editandoId);
            editandoId = null;
        } else {
            await client.from('estudio_data').insert([payload]);
        }
        
        location.reload();
    }

    function prepararEdicion(id) {
        const m = stockGlobal.find(x => x.id === id);
        editandoId = id;
        cambiarVista('INICIO');
        document.getElementById('titulo-form').innerText = "✏️ Editando Material";
        document.getElementById('m-nombre').value = m.tipo_material;
        document.getElementById('m-categoria').value = m.categoria;
        document.getElementById('m-cantidad').value = m.cantidad;
    }

    async function eliminar(id) {
        if(confirm("¿Seguro que quieres borrarlo?")) {
            await client.from('estudio_data').delete().eq('id', id);
            cargarDatos();
        }
    }

    iniciar();
</script>
</body>
</html>
