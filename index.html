<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mi Taller Rosa</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --p: #ff85a2; --pc: #fce4ec; --s: #f06292; --f: #fcf8f9; --b: #ffffff; --br: #f1e1e5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--f); margin: 0; padding: 15px; padding-bottom: 80px; }
        
        /* Menú Superior */
        .menu-secciones { display: flex; gap: 8px; background: var(--b); padding: 8px; border-radius: 50px; position: sticky; top: 10px; z-index: 100; border: 1px solid var(--br); margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .btn-nav { flex: 1; padding: 12px; border: none; background: transparent; font-weight: 700; color: #888; cursor: pointer; border-radius: 40px; font-size: 11px; text-transform: uppercase; transition: 0.3s; }
        .btn-nav.active { background: var(--pc); color: var(--s); border: 1px solid var(--p); }

        /* Filtros de Categoría */
        .filtros-container { display: flex; gap: 8px; overflow-x: auto; padding: 5px 2px 15px 2px; scrollbar-width: none; }
        .filtros-container::-webkit-scrollbar { display: none; }
        .btn-filtro { white-space: nowrap; padding: 8px 16px; border-radius: 20px; border: 1px solid var(--br); background: white; color: #666; font-size: 12px; cursor: pointer; font-weight: 600; }
        .btn-filtro.active { background: var(--p); color: white; border-color: var(--p); box-shadow: 0 4px 8px rgba(255,133,162,0.3); }

        /* Grid de Stock */
        .grid-estudio { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .item-card { background: var(--b); border-radius: 20px; border: 1px solid var(--br); overflow: hidden; position: relative; transition: transform 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        
        /* Botones de acción en la foto */
        .acciones-flotantes { position: absolute; top: 8px; right: 8px; display: flex; gap: 5px; z-index: 10; }
        .btn-mini { background: rgba(255,255,255,0.9); border: 1px solid var(--br); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }

        .foto-material { width: 100%; height: 120px; object-fit: cover; background: #fff5f7; }
        
        .info-material { padding: 12px; text-align: center; }
        .info-material h4 { margin: 0 0 10px 0; color: #444; font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Controles de Cantidad */
        .controles-stock { display: flex; align-items: center; justify-content: center; gap: 12px; background: var(--f); padding: 5px; border-radius: 12px; }
        .btn-qty { background: var(--p); color: white; border: none; width: 32px; height: 32px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; line-height: 1; transition: 0.2s; }
        .btn-qty:active { transform: scale(0.9); }
        .qty-num { font-weight: 800; font-size: 15px; color: #333; min-width: 20px; }

        /* Formularios */
        .card-form { background: white; padding: 25px; border-radius: 30px; border: 1px solid var(--br); box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid var(--br); background: var(--f); box-sizing: border-box; font-size: 14px; }
        .btn-grande { width: 100%; background: var(--p); color: white; border: none; padding: 16px; border-radius: 15px; font-weight: 800; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(255,133,162,0.4); }
    </style>
</head>
<body>

    <div class="menu-secciones">
        <button class="btn-nav" id="nav-INICIO" onclick="cambiarVista('INICIO')">🏠 INICIO</button>
        <button class="btn-nav active" id="nav-STOCK" onclick="cambiarVista('STOCK')">📦 STOCK</button>
        <button class="btn-nav" id="nav-PROYECTOS" onclick="cambiarVista('PROYECTOS')">🎨 PROYECTOS</button>
    </div>

    <!-- SECCIÓN STOCK -->
    <div id="vista-STOCK">
        <div class="filtros-container">
            <button class="btn-filtro active" onclick="filtrar('Todo')">✨ Todo</button>
            <button class="btn-filtro" onclick="filtrar('Lana')">🧶 Lana</button>
            <button class="btn-filtro" onclick="filtrar('Telas')">👗 Telas</button>
            <button class="btn-filtro" onclick="filtrar('Accesorios')">🎀 Accesorios</button>
        </div>
        <div id="lista-stock" class="grid-estudio">
            <p style="text-align:center; color:#999; grid-column: 1/-1;">Cargando tus materiales...</p>
        </div>
    </div>

    <!-- SECCIÓN INICIO (AÑADIR) -->
    <div id="vista-INICIO" style="display:none;">
        <div class="card-form">
            <h2 style="color:var(--s); text-align:center; margin-top:0;">✨ Nuevo Material</h2>
            <input type="text" id="m-nombre" placeholder="Nombre del material (ej: Mega Ball Azul)">
            <select id="m-categoria">
                <option value="Lana">🧶 Lana</option>
                <option value="Telas">👗 Tela</option>
                <option value="Accesorios">🎀 Accesorio / Otros</option>
            </select>
            <input type="number" id="m-cantidad" placeholder="Cantidad inicial" value="1">
            <input type="text" id="m-foto" placeholder="URL de la imagen (opcional)">
            <button class="btn-grande" onclick="guardarNuevo()">AÑADIR AL STOCK</button>
        </div>
    </div>

    <!-- SECCIÓN PROYECTOS -->
    <div id="vista-PROYECTOS" style="display:none; text-align:center; padding:40px 20px;">
        <div style="font-size: 50px;">🎨</div>
        <h2 style="color:var(--s);">Zona de Diseño</h2>
        <p style="color:#888;">Aquí podrás dibujar y planificar tus próximos amigurumis muy pronto.</p>
    </div>

<script>
    const supabaseUrl = 'https://etcdefyqqlmmdzroqilh.supabase.co';
    const supabaseKey = 'sb_publishable_-swLbYwdrtw7xnWyTFHLnA_zapSeCSP'; 
    const client = window.supabase.createClient(supabaseUrl, supabaseKey);

    let lanasGlobal = [];

    async function cargarDatos() {
        const { data, error } = await client.from('estudio_data').select('*').order('created_at', {ascending: false});
        if (error) console.log(error);
        lanasGlobal = data || [];
        renderizar(lanasGlobal);
    }

    function renderizar(lista) {
        const contenedor = document.getElementById('lista-stock');
        if(lista.length === 0) {
            contenedor.innerHTML = '<p style="text-align:center; color:#999; grid-column: 1/-1;">No hay materiales. ¡Añade uno en Inicio!</p>';
            return;
        }
        contenedor.innerHTML = lista.map(m => `
            <div class="item-card">
                <div class="acciones-flotantes">
                    <button class="btn-mini" onclick="borrarMaterial(${m.id})">🗑️</button>
                </div>
                <img src="${m.contenido || 'https://via.placeholder.com/150?text=Sin+Foto'}" class="foto-material">
                <div class="info-material">
                    <h4>${m.tipo_material}</h4>
                    <div class="controles-stock">
                        <button class="btn-qty" onclick="cambiarStock(${m.id}, -1)">−</button>
                        <span class="qty-num">${m.cantidad}</span>
                        <button class="btn-qty" onclick="cambiarStock(${m.id}, 1)">+</button>
                    </div>
                </div>
            </div>
        `).join('');
    }

    async function cambiarStock(id, cambio) {
        const item = lanasGlobal.find(m => m.id === id);
        const nuevaCant = Math.max(0, (item.cantidad || 0) + cambio);
        await client.from('estudio_data').update({ cantidad: nuevaCant }).eq('id', id);
        cargarDatos();
    }

    async function guardarNuevo() {
        const nombre = document.getElementById('m-nombre').value;
        const cat = document.getElementById('m-categoria').value;
        const cant = document.getElementById('m-cantidad').value;
        const foto = document.getElementById('m-foto').value;

        if(!nombre) return alert("Ponle un nombre al menos");

        await client.from('estudio_data').insert([
            { tipo_material: nombre, categoria: cat, cantidad: parseInt(cant), contenido: foto }
        ]);

        document.getElementById('m-nombre').value = "";
        alert("¡Añadido con éxito!");
        cambiarVista('STOCK');
    }

    async function borrarMaterial(id) {
        if(confirm("¿Seguro que quieres borrar este material?")) {
            await client.from('estudio_data').delete().eq('id', id);
            cargarDatos();
        }
    }

    function cambiarVista(v) {
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        document.getElementById('nav-' + v).classList.add('active');
        
        ['INICIO', 'STOCK', 'PROYECTOS'].forEach(id => {
            document.getElementById('vista-' + id).style.display = (id === v) ? 'block' : 'none';
        });
        
        if(v === 'STOCK') cargarDatos();
    }

    function filtrar(cat) {
        document.querySelectorAll('.btn-filtro').forEach(b => {
            b.classList.toggle('active', b.innerText.includes(cat));
        });
        const filtrados = (cat === 'Todo') ? lanasGlobal : lanasGlobal.filter(m => m.categoria === cat);
        renderizar(filtrados);
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
